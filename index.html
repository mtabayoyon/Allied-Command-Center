}

/* ---------------- board ---------------- */
function Board({A,move,onOpen,go}){
  const [over,setOver]=useState(null);
  const [vt,setVt]=useState([]);        // selected verticals — empty = all
  const [mk,setMk]=useState('');        // market
  const [q,setQ]=useState('');
  const [only,setOnly]=useState(false); // only show what's past cadence

  const stale=a=>daysSince(a.last)>CADENCE[a.stage];

  // what's actually on the board, so we don't show filters for verticals nobody has
  const vCounts=useMemo(()=>{
    const m={}; A.forEach(a=>{m[a.vertical]=(m[a.vertical]||0)+1;});
    return VERTICALS.filter(v=>m[v]).map(v=>[v,m[v]]);
  },[A]);
  const mCounts=useMemo(()=>{
    const m={}; A.forEach(a=>{m[a.market]=(m[a.market]||0)+1;});
    return MARKETS.filter(v=>m[v]).map(v=>[v,m[v]]);
  },[A]);

  const F=useMemo(()=>A.filter(a=>
    (!vt.length||vt.includes(a.vertical)) &&
    (!mk||a.market===mk) &&
    (!only||stale(a)) &&
    (!q||`${a.name} ${a.contact} ${a.notes}`.toLowerCase().includes(q.toLowerCase()))
  ),[A,vt,mk,only,q]);

  const counts=STAGES.map(s=>F.filter(a=>a.stage===s.id).length);
  const staleN=F.filter(stale).length;
  const filtered = vt.length||mk||only||q;
  const toggleV=v=>setVt(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const clear=()=>{setVt([]);setMk('');setQ('');setOnly(false);};

  return <div className="grid">
    <div className="kpis">
      <Kpi lab={filtered?'Accounts shown':'Accounts'} val={F.length} sub={filtered?`of ${A.length} on the board`:'in the system'}/>
      <Kpi lab="Opportunities (A)" val={counts[2]} sub="signable in 100 days" cls="hz"/>
      <Kpi lab="Signed clients" val={counts[4]+counts[5]} sub={`${counts[5]} VIP · ${counts[4]} Priority`} cls="go"/>
      <Kpi lab="Past cadence" val={staleN} sub="need a touch now" cls={staleN?'al':''}/>
    </div>

    <div className="card">
      <h3>Response board <span className="hint" style={{fontWeight:400,textTransform:'none',letterSpacing:0,fontFamily:'Inter'}}>— drag an account to move it a rung. Click to open.</span></h3>
      <div className="body">

        {A.length>0 && <div className="filters">
          <div className="frow">
            <span className="flabel">Vertical</span>
            <div className="chips">
              <button className={'chip'+(!vt.length?' on':'')} onClick={()=>setVt([])}>All <b>{A.length}</b></button>
              {vCounts.map(([v,n])=><button key={v} className={'chip'+(vt.includes(v)?' on':'')} onClick={()=>toggleV(v)}>
                {v.replace(' / ',' / ').replace(' Mgmt','')} <b>{n}</b>
              </button>)}
            </div>
          </div>

          <div className="frow">
            <span className="flabel">Market</span>
            <div className="chips">
              <button className={'chip'+(!mk?' on':'')} onClick={()=>setMk('')}>All</button>
              {mCounts.map(([m,n])=><button key={m} className={'chip'+(mk===m?' on':'')} onClick={()=>setMk(mk===m?'':m)}>
                {m.split(' /')[0]} <b>{n}</b>
              </button>)}
            </div>
          </div>

          <div className="frow">
            <input placeholder="Search the board…" value={q} onChange={e=>setQ(e.target.value)} style={{maxWidth:240}}/>
            <button className={'chip'+(only?' on al':'')} onClick={()=>setOnly(!only)}>Past cadence only</button>
            {filtered && <button className="plink" onClick={clear}>Clear filters</button>}
            {filtered && <span className="hint" style={{marginLeft:'auto'}}>Showing {F.length} of {A.length}</span>}
          </div>
        </div>}

        <div className="board">
          {STAGES.map(s=>{
            const list=F.filter(a=>a.stage===s.id);
            return <div key={s.id}
              className={'col'+(over===s.id?' over':'')}
              onDragOver={e=>{e.preventDefault();setOver(s.id);}}
              onDragLeave={()=>setOver(o=>o===s.id?null:o)}
              onDrop={e=>{e.preventDefault();setOver(null);const id=e.dataTransfer.getData('id');if(id)move(id,s.id);}}>
              <div className="colhead" style={{'--stripe':s.c,borderBottomColor:s.c}}>
                <span>{s.name}</span><span className="n">{list.length}</span>
              </div>
              <div className="colbody">
                {list.slice(0,60).map(a=>{
                  const d=daysSince(a.last);
                  const over_=d>CADENCE[a.stage];
                  const cls=!a.last?'':over_?(d>CADENCE[a.stage]*2?'hot':'stale'):'fresh';
                  return <div key={a.id} className={'acct '+cls} draggable
                    onDragStart={e=>e.dataTransfer.setData('id',a.id)}
                    onClick={()=>onOpen(a)}>
                    <div className="nm">{a.name}</div>
                    <div className="mt">{a.market.split(' /')[0]}{a.doors>0?` · ${a.doors} bldgs`:''}</div>
                    <div className="fo">
                      <span className="tag">{a.vertical.split(' ')[0]}</span>
                      <span className={'days '+(!a.last?'':over_?(d>CADENCE[a.stage]*2?'bad':'warn'):'')}>{a.last?`${d}d`:'new'}</span>
                    </div>
                  </div>;
                })}
                {list.length>60 && <div className="hint" style={{padding:'6px 4px',textAlign:'center'}}>
                  +{list.length-60} more — filter, or use the Accounts tab
                </div>}
                {!list.length && <div style={{fontSize:11,color:'#8494A0',padding:'10px 4px',lineHeight:1.4}}>
                  {filtered? 'Nothing here matches the filter.' : s.def}
                </div>}
                <button className="plink" style={{marginTop:'auto',paddingTop:6,textAlign:'left'}} onClick={()=>go(STAGE_HELP[s.id])}>What to do at this stage →</button>
              </div>
            </div>;
          })}
        </div>

        {!A.length && <div className="empty" style={{padding:'22px 16px'}}>
          <b>The board is empty</b>
          Add an account, or bring the whole target list in at once with <b>Import list</b> at the top right.
        </div>}
        <div className="hint" style={{marginTop:10}}>
          Cadence before an account goes stale — Lead 21d · Prospect 14d · Opportunity 10d · Verbal 7d · Priority 45d · VIP 30d.
          <b style={{color:'var(--alarm)'}}> Red</b> = more than double the cadence. Movement up a rung is the only score that counts.{' '}
          <button className="plink" onClick={()=>go('p-ladder')}>Read the stage definitions →</button>
        </div>
      </div>
    </div>
  </div>;
}

/* ---------------- week ---------------- */
function Week({A,wk,w,bump,weeks,go}){
  const pct=k=>{const g=WEEKLY.find(x=>x.id===k).goal;return Math.min(100,Math.round(((w[k]||0)/g)*100));};
  const total=WEEKLY.reduce((s,k)=>s+Math.min(1,(w[k.id]||0)/k.goal),0)/WEEKLY.length*100;
  const prev=Object.keys(weeks).filter(k=>k<wk).sort().slice(-4).reverse();

  return <div className="grid">
    <div className="split">
      <div className="card">
        <h3>Week of {fmtWeek(wk)} — leading activity</h3>
        <div className="body grid" style={{gap:10}}>
          {WEEKLY.map(k=>{
            const v=w[k.id]||0,p=pct(k.id);
            return <div key={k.id}>
              <div className="row" style={{justifyContent:'space-between'}}>
                <div style={{fontWeight:600,fontSize:13}}>{k.lab}</div>
                <div className="row" style={{gap:6}}>
                  <span className="mono" style={{fontSize:13,fontWeight:700}}>{v}<span style={{color:'var(--mute)',fontWeight:400}}>/{k.goal}</span></span>
                  <button className="btn sm" onClick={()=>bump(k.id,-1)}>–</button>
                  <button className="btn sm pri" onClick={()=>bump(k.id,1)}>+</button>
                </div>
              </div>
              <div className="meter"><i className={p>=100?'done':p<40?'low':''} style={{width:p+'%'}}/></div>
            </div>;
          })}
          <div style={{borderTop:'1px solid var(--line)',paddingTop:10,marginTop:2}}>
            <div className="row" style={{justifyContent:'space-between'}}>
              <b className="disp" style={{fontSize:17}}>Week complete</b>
              <span className="mono" style={{fontWeight:700}}>{Math.round(total)}%</span>
            </div>
            <div className="meter" style={{height:12}}><i className={total>=100?'done':total<40?'low':''} style={{width:total+'%'}}/></div>
          </div>
        </div>
      </div>

      <div className="grid" style={{alignContent:'start'}}>
        <div className="card">
          <h3>The rhythm <button className="plink" style={{marginLeft:'auto',fontFamily:'Inter'}} onClick={()=>go('p-rhythm')}>Why →</button></h3>
          <div className="body grid" style={{gap:7}}>
            {RITUAL.map(r=><div key={r.d} style={{fontSize:12,lineHeight:1.45}}>
              <b className="disp" style={{fontSize:14,color:'var(--water)'}}>{r.d}</b><br/>{r.t}
            </div>)}
          </div>
        </div>
        {prev.length>0 && <div className="card">
          <h3>Prior weeks</h3>
          <div className="body">
            {prev.map(k=>{
              const p=Math.round(WEEKLY.reduce((s,x)=>s+Math.min(1,((weeks[k]||{})[x.id]||0)/x.goal),0)/WEEKLY.length*100);
              return <div key={k} className="stat"><span>{fmtWeek(k)}</span><b style={{color:p>=100?'var(--go)':p<40?'var(--alarm)':'var(--ink)'}}>{p}%</b></div>;
            })}
          </div>
        </div>}
      </div>
    </div>
  </div>;
}

/* ---------------- accounts ---------------- */
function Accounts({A,onOpen,remove,touch}){
  const [q,setQ]=useState(''),[st,setSt]=useState(''),[mk,setMk]=useState(''),[vt,setVt]=useState(''),[sort,setSort]=useState('last');
  const list=useMemo(()=>{
    let L=A.filter(a=>
      (!q||`${a.name} ${a.contact} ${a.notes} ${a.email}`.toLowerCase().includes(q.toLowerCase()))&&
      (!st||a.stage===st)&&(!mk||a.market===mk)&&(!vt||a.vertical===vt));
    L.sort((a,b)=>{
      if(sort==='last') return daysSince(b.last)-daysSince(a.last);
      if(sort==='stage')return stageIx(b.stage)-stageIx(a.stage);
      if(sort==='doors')return (b.doors||0)-(a.doors||0);
      return a.name.localeCompare(b.name);
    });
    return L;
  },[A,q,st,mk,vt,sort]);

  return <div className="card">
    <h3>Accounts <span className="mono" style={{fontSize:12,color:'var(--mute)'}}>{list.length}</span></h3>
    <div className="body">
      <div className="bar">
        <input placeholder="Search name, contact, notes…" value={q} onChange={e=>setQ(e.target.value)} style={{minWidth:220}}/>
        <select value={st} onChange={e=>setSt(e.target.value)}><option value="">All stages</option>{STAGES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
        <select value={mk} onChange={e=>setMk(e.target.value)}><option value="">All markets</option>{MARKETS.map(m=><option key={m}>{m}</option>)}</select>
        <select value={vt} onChange={e=>setVt(e.target.value)}><option value="">All verticals</option>{VERTICALS.map(v=><option key={v}>{v}</option>)}</select>
      </div>
      {!list.length ? <div className="empty"><b>No accounts match</b>Clear a filter, or add the account you just talked to.</div> :
      <div style={{overflowX:'auto'}}>
      <table>
        <thead><tr>
          <th onClick={()=>setSort('name')}>Company</th><th>Contact</th><th onClick={()=>setSort('stage')}>Stage</th>
          <th>Market</th><th onClick={()=>setSort('doors')}>Bldgs</th><th onClick={()=>setSort('last')}>Last touch</th><th>Next action</th><th></th>
        </tr></thead>
        <tbody>
          {list.map(a=>{
            const d=daysSince(a.last),ov=d>CADENCE[a.stage],s=STAGES[stageIx(a.stage)];
            return <tr key={a.id}>
              <td><b style={{cursor:'pointer'}} onClick={()=>onOpen(a)}>{a.name}</b><div className="hint">{a.vertical}</div></td>
              <td>{a.contact||<span className="hint">—</span>}<div className="hint">{a.phone}</div></td>
              <td><span className="tag" style={{background:s.c,color:s.id==='vip'?'#0E151C':'#fff'}}>{s.name}</span></td>
              <td style={{fontSize:11.5}}>{a.market}</td>
              <td className="mono">{a.doors||'—'}</td>
              <td><span className={'days '+(!a.last?'':ov?(d>CADENCE[a.stage]*2?'bad':'warn'):'')}>{a.last?`${d}d ago`:'never'}</span></td>
              <td style={{fontSize:11.5,maxWidth:210}}>{a.next||<span className="hint">{NEXT_ACTION[a.stage]}</span>}</td>
              <td><div className="row" style={{gap:5,flexWrap:'nowrap'}}>
                <button className="btn sm" onClick={()=>touch(a.id)}>Log touch</button>
                <button className="btn sm dang" onClick={()=>{if(confirm(`Delete ${a.name}? This can't be undone.`))remove(a.id);}}>Del</button>
              </div></td>
            </tr>;
          })}
        </tbody>
      </table></div>}
    </div>
  </div>;
}

/* ---------------- call sheet ---------------- */
function CallSheet({A,touch,onOpen,go}){
  const list=useMemo(()=>{
    return A.map(a=>{
      const d=daysSince(a.last),cad=CADENCE[a.stage];
      // score: how overdue, weighted by how far up the ladder + portfolio size
      const score=(d/cad)*(1+stageIx(a.stage)*0.35)+Math.min(2,(a.doors||0)/10);
      return {...a,d,over:d-cad,score};
    }).filter(a=>a.d>=CADENCE[a.stage]).sort((x,y)=>y.score-x.score).slice(0,12);
  },[A]);

  return <div className="card">
    <h3>Today's call sheet — {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</h3>
    <div className="body">
      {!list.length ? <div className="empty"><b>Nothing is overdue</b>Every account is inside its cadence. Go book meetings — or add more targets to the board.</div> : <>
      <div className="hint" style={{marginBottom:10}}>Ranked by how far past cadence they are, weighted by stage and portfolio size. Work top to bottom. Print this page for the truck.{' '}
        <button className="plink" onClick={()=>go('p-phone')}>The call script →</button>{' · '}
        <button className="plink" onClick={()=>go('p-obj')}>Objections →</button>{' · '}
        <button className="plink" onClick={()=>go('p-emails')}>Email templates →</button>
      </div>
      <div style={{overflowX:'auto'}}>
      <table>
        <thead><tr><th>#</th><th>Company</th><th>Who</th><th>Phone</th><th>Overdue</th><th>Purpose of this call</th><th></th></tr></thead>
        <tbody>{list.map((a,i)=>{
          const s=STAGES[stageIx(a.stage)];
          return <tr key={a.id}>
            <td className="mono" style={{color:'var(--mute)'}}>{String(i+1).padStart(2,'0')}</td>
            <td><b style={{cursor:'pointer'}} onClick={()=>onOpen(a)}>{a.name}</b><div className="hint"><span className="tag" style={{background:s.c,color:s.id==='vip'?'#0E151C':'#fff'}}>{s.name}</span> {a.market}</div></td>
            <td>{a.contact}<div className="hint">{a.title}</div></td>
            <td className="mono" style={{fontSize:11.5}}>{a.phone}</td>
            <td><span className="days bad">+{a.over}d</span></td>
            <td style={{fontSize:12,maxWidth:280}}>{a.next||NEXT_ACTION[a.stage]}</td>
            <td><button className="btn sm pri" onClick={()=>touch(a.id)}>Called</button></td>
          </tr>;})}
        </tbody>
      </table></div></>}
    </div>
  </div>;
}

/* ---------------- gameplan ---------------- */
function Plan({A,go}){
  const c=id=>A.filter(a=>a.stage===id).length;
  const signed=c('vip')+c('priority');
  const goals=[
    ['Named targets in system',A.length,300],
    ['Opportunities (A)',c('opp'),25],
    ['Verbals',c('verbal'),15],
    ['Signed clients',signed,12],
    ['Response plans complete',A.filter(a=>stageIx(a.stage)>=4).flatMap(a=>a.bldgs||[]).filter(b=>dmScore(b).all===100).length,8],
    ['Plumbing partners',A.filter(a=>a.vertical==='Plumbing Partner'&&stageIx(a.stage)>=3).length,10],
  ];
  const fmax=Math.max(1,...STAGES.map(s=>c(s.id)));
  const B=A.filter(x=>stageIx(x.stage)>=4).flatMap(x=>x.bldgs||[]);
  const plansDone=B.filter(b=>dmScore(b).all===100).length;
  const shut=B.reduce((n,b)=>n+b.shutoffs.length,0);
  const shutTag=B.reduce((n,b)=>n+b.shutoffs.filter(x=>x.tagged).length,0);

  return <div className="grid">
    <div className="split">
      <div className="card">
        <h3>90-day scoreboard</h3>
        <div className="body grid" style={{gap:11}}>
          {goals.map(([l,v,g])=>{const p=Math.min(100,Math.round(v/g*100));return <div key={l}>
            <div className="row" style={{justifyContent:'space-between'}}>
              <span style={{fontWeight:600,fontSize:13}}>{l}</span>
              <span className="mono" style={{fontWeight:700}}>{v}<span style={{color:'var(--mute)',fontWeight:400}}>/{g}</span></span>
            </div>
            <div className="meter"><i className={p>=100?'done':p<35?'low':''} style={{width:p+'%'}}/></div>
          </div>;})}
        </div>
      </div>
      <div className="card">
        <h3>Pipeline shape</h3>
        <div className="body">
          <div className="funnel">
            {STAGES.map(s=>{const n=c(s.id);return <div key={s.id} className="fstep">
              <span className="flab">{s.name}</span>
              <div className="fbar" style={{width:Math.max(4,n/fmax*100)+'%',background:s.c,color:s.id==='vip'?'#0E151C':'#fff'}}>{n}</div>
            </div>;})}
          </div>
          <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--line)'}}>
            <div className="stat"><span>Response plans complete</span><b>{plansDone}/{B.length||0} buildings</b></div>
            <div className="stat"><span>Shutoffs tagged</span><b>{shutTag}/{shut||0}</b></div>
            <div className="stat"><span>Conversion, Opportunity → Signed</span><b>{c('opp')+signed?Math.round(signed/(c('opp')+signed)*100):0}%</b></div>
            <div className="hint" style={{marginTop:8,lineHeight:1.45}}>An account isn't real until the walkthrough is done. Unwalked signed accounts churn like prospects.</div>
          </div>
        </div>
      </div>
    </div>

    <div className="card">
      <h3>The three phases</h3>
      <div className="body grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))'}}>
        {[
          ['Days 1–30','Contact & calendar','40 first meetings booked. Nothing else counts. 100 dials, 50 emails, 10 drop-offs a week. 14-day sequence per target, then nurture.','p-phase1'],
          ['Days 31–60','Present & propose','25 presentations. Every one ends in a signature, a scheduled walkthrough, or a written no. Never "I\'ll send something over."','p-phase2'],
          ['Days 61–90','Sign & embed','12 signed, 8 walkthroughs, 3 lunch & learns. The walkthrough is the real close — it puts you inside the building, next to the engineer who actually calls at 2am.','p-walk'],
        ].map(([a,b,t,pid])=><div key={a} style={{borderLeft:'3px solid var(--hiviz)',paddingLeft:12}}>
          <div className="mono" style={{fontSize:11,color:'var(--mute)',letterSpacing:'.08em'}}>{a.toUpperCase()}</div>
          <div className="disp" style={{fontSize:19,margin:'2px 0 5px'}}>{b}</div>
          <div style={{fontSize:12.5,lineHeight:1.5,color:'#3C4A55'}}>{t}</div>
          <button className="plink" style={{marginTop:6}} onClick={()=>go(pid)}>Open the playbook →</button>
        </div>)}
      </div>
    </div>
  </div>;
}

/* ---------------- playbook reader ---------------- */
function Playbook({jump,clear}){
  const [open,setOpen]=useState(jump||'p-position');
  const [q,setQ]=useState('');
  const [copied,setCopied]=useState('');
  const bodyRef=useRef(null);

  useEffect(()=>{ if(jump){setOpen(jump);clear();} },[jump]);
  useEffect(()=>{
    const el=bodyRef.current; if(!el) return;
    const h=e=>{
      const s=e.target.closest('.script'); if(!s) return;
      const txt=s.getAttribute('data-copy'); if(!txt) return;
      navigator.clipboard?.writeText(txt).then(()=>{setCopied(open+txt.slice(0,12));setTimeout(()=>setCopied(''),1600);});
    };
    el.addEventListener('click',h);
    return ()=>el.removeEventListener('click',h);
  },[open]);

  const hits=useMemo(()=>{
    if(!q.trim()) return null;
    const t=q.toLowerCase();
    return PLAY_FLAT.filter(i=>(i.t+' '+i.k+' '+i.h).toLowerCase().includes(t));
  },[q]);

  const cur=PLAY_FLAT.find(i=>i.id===open)||PLAY_FLAT[0];
  const ix=PLAY_FLAT.findIndex(i=>i.id===cur.id);
  const prev=PLAY_FLAT[ix-1],next=PLAY_FLAT[ix+1];

  return <div className="reader">
    <aside className="toc">
      <input placeholder="Search the playbook…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:10}}/>
      {hits ? (hits.length?hits.map(i=>
          <button key={i.id} className={'tocitem'+(open===i.id?' on':'')} onClick={()=>{setOpen(i.id);setQ('');}}>
            {i.t}<span className="tocg">{i.g}</span></button>)
        : <div className="hint" style={{padding:'8px 4px'}}>Nothing matches "{q}".</div>)
      : PLAY.map(g=><div key={g.g} className="tocgrp">
          <div className="tochead">{g.g}</div>
          {g.items.map(i=><button key={i.id} className={'tocitem'+(open===i.id?' on':'')} onClick={()=>setOpen(i.id)}>{i.t}</button>)}
        </div>)}
      <div className="hint" style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--line)',lineHeight:1.5}}>
        Grey boxes are scripts. <b>Click one to copy it.</b>
      </div>
    </aside>

    <article className="card">
      <h3>
        <span style={{color:'var(--water)'}}>{cur.g}</span>
        <span style={{color:'var(--line)'}}>/</span>
        {cur.t}
        <span className="tag" style={{marginLeft:'auto',fontFamily:'Inter'}}>{cur.k}</span>
      </h3>
      <div className="body prose" ref={bodyRef} dangerouslySetInnerHTML={{__html:cur.h}}/>
      <div className="pager">
        {prev? <button className="btn" onClick={()=>{setOpen(prev.id);window.scrollTo(0,0);}}>← {prev.t}</button> : <span/>}
        {copied && <span className="copied">Copied to clipboard</span>}
        {next? <button className="btn pri" onClick={()=>{setOpen(next.id);window.scrollTo(0,0);}}>{next.t} →</button> : <span/>}
      </div>
    </article>
  </div>;
}




/* ---- bulk import: get 300 targets onto the board in one move ---- */

/* A real CSV parser — quoted fields, embedded commas, escaped quotes.
   Splitting on ',' breaks the moment a company is called "Smith, Jones & Co." */
function parseCSV(text){
  const rows=[]; let row=[], cell='', q=false;
  text=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const tab=(text.split('\n')[0].match(/\t/g)||[]).length > (text.split('\n')[0].match(/,/g)||[]).length;
  const D=tab?'\t':',';
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=c;
    } else if(c==='"'){ q=true; }
    else if(c===D){ row.push(cell); cell=''; }
    else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
    else cell+=c;
  }
  if(cell||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()));
}

const FIELDS=[
  {k:'name',    t:'Company',        req:true,  hints:['company name','company','account name','organization','business','account','firm','employer','dba']},
  {k:'first',   t:'First name',     hints:['first name','first','fname','given']},
  {k:'last',    t:'Last name',      hints:['last name','last','lname','surname','family']},
  {k:'contact', t:'Full name',      note:'only if first/last are one column', hints:['full name','contact name','contact','name','poc','decision maker']},
  {k:'title',   t:'Title',          hints:['job title','title','role','position']},
  {k:'phone',   t:'Phone',          hints:['phone number','phone','mobile','cell','direct','tel','office number']},
  {k:'email',   t:'Email',          hints:['email','e-mail','mail']},
  {k:'vertical',t:'Vertical',       hints:['industry','vertical','type','category','segment','sector']},
  {k:'market',  t:'Market',         hints:['city','market','region','territory','area','town','metro']},
  {k:'doors',   t:'Buildings',      hints:['buildings','doors','units','properties','portfolio','sites','number of']},
  {k:'stage',   t:'Stage',          hints:['stage','status','lifecycle stage']},
  {k:'notes',   t:'Notes',          hints:['notes','note','comment','description','street address','address','source','website']},
];

/* Guess which column is which. Beats making someone map 10 dropdowns. */
function autoMap(headers){
  const m={}; const used=new Set();
  FIELDS.forEach(f=>{
    const i=headers.findIndex((h,ix)=>{
      if(used.has(ix)) return false;
      const H=String(h).toLowerCase().trim();
      return f.hints.some(x=>H===x||H.includes(x));
    });
    if(i>=0){ m[f.k]=i; used.add(i); }
  });
  return m;
}

/* Fuzzy-match a free-text value to one of our fixed lists. */
function nearest(val,list){
  if(!val) return null;
  const v=String(val).toLowerCase().trim();
  let hit=list.find(x=>x.toLowerCase()===v);
  if(hit) return hit;
  hit=list.find(x=>x.toLowerCase().includes(v)||v.includes(x.toLowerCase().split(' /')[0]));
  return hit||null;
}
function guessMarket(v){
  if(!v) return null;
  const s=String(v).toLowerCase();
  if(/san francisco|\bsf\b|daly city|south san|brisbane/.test(s)) return MARKETS[0];
  if(/petaluma|santa rosa|novato|sonoma|marin|napa|rohnert|cotati|san rafael|north bay|windsor|healdsburg/.test(s)) return MARKETS[1];
  if(/walnut creek|concord|oakland|berkeley|east bay|danville|lafayette|pleasant hill|alamo|orinda|martinez/.test(s)) return MARKETS[2];
  if(/san jose|santa clara|sunnyvale|south bay|campbell|cupertino|milpitas|palo alto|mountain view/.test(s)) return MARKETS[3];
  return null;
}
function guessVertical(v){
  if(!v) return null;
  const s=String(v).toLowerCase();
  if(/hoa|condo|association|community/.test(s)) return VERTICALS[1];
  if(/apartment|multifamily|multi-family|residential/.test(s)) return VERTICALS[2];
  if(/medical|dental|surgical|clinic|assisted|senior|nursing|health/.test(s)) return VERTICALS[3];
  if(/hotel|restaurant|hospitality|motel|inn/.test(s)) return VERTICALS[4];
  if(/plumb|rooter|drain/.test(s)) return VERTICALS[5];
  if(/insur|adjust|carrier|claims|tpa/.test(s)) return VERTICALS[6];
  if(/contractor|construction|\bgc\b|builder/.test(s)) return VERTICALS[7];
  if(/school|church|city of|county|municipal|district|university/.test(s)) return VERTICALS[8];
  if(/realt|broker|real estate|inspect/.test(s)) return VERTICALS[9];
  if(/propert|management|commercial|facilit/.test(s)) return VERTICALS[0];
  return null;
}

function Importer({A,onImport,onClose}){
  const [step,setStep]=useState(1);
  const [rows,setRows]=useState(null);
  const [hasHead,setHasHead]=useState(true);
  const [map,setMap]=useState({});
  const [defMarket,setDefMarket]=useState(MARKETS[0]);
  const [defVert,setDefVert]=useState(VERTICALS[0]);
  const [text,setText]=useState('');
  const [busy,setBusy]=useState(false);

  const load=raw=>{
    const r=parseCSV(raw);
    if(r.length<1){ alert("That didn't parse as a table. Paste rows from a spreadsheet, or upload a .csv file."); return; }
    setRows(r);
    setMap(autoMap(r[0]));
    setStep(2);
  };
  const onFile=e=>{
    const f=e.target.files[0]; e.target.value='';
    if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>load(rd.result);
    rd.readAsText(f);
  };

  const head = rows? (hasHead? rows[0].map(h=>String(h).trim()) : rows[0].map((_,i)=>`Column ${i+1}`)) : [];
  const body = rows? (hasHead? rows.slice(1) : rows) : [];

  /* Build the accounts. Roll several contact rows at the same company up into
     one account: best contact becomes the decision-maker, the rest get listed
     in the notes so nobody is lost. */
  const built=useMemo(()=>{
    if(!rows) return {ok:[],dupe:[],bad:0,rolled:0};
    const norm=x=>String(x||'').toLowerCase().replace(/\b(inc|llc|corp|co|ltd|the|company|group)\b/g,'').replace(/[^a-z0-9]/g,'');
    const existing=new Set(A.map(a=>norm(a.name)));
    const get=(r,k)=>map[k]!=null? String(r[map[k]]??'').trim() : '';

    // A contact with a title that sounds like a decision-maker outranks one without.
    const rank=t=>{
      const s=String(t||'').toLowerCase();
      if(/owner|principal|president|founder|ceo|managing/.test(s)) return 5;
      if(/director|vp|vice president|head of/.test(s)) return 4;
      if(/property manager|community manager|facilit|general manager/.test(s)) return 3;
      if(/manager|supervisor/.test(s)) return 2;
      if(/assistant|coordinator|admin/.test(s)) return 1;
      return 0;
    };

    const groups=new Map(); let bad=0, rowCount=0;

    body.forEach(r=>{
      const company=get(r,'name');
      if(!company){ bad++; return; }
      rowCount++;
      const key=norm(company);

      const first=get(r,'first'), last=get(r,'last');
      const who=[first,last].filter(Boolean).join(' ').trim() || get(r,'contact');
      const person={who, title:get(r,'title'), phone:get(r,'phone'), email:get(r,'email'), rank:rank(get(r,'title'))};

      if(!groups.has(key)){
        groups.set(key,{company, rows:[], people:[],
          vertical:get(r,'vertical'), market:get(r,'market'),
          doors:get(r,'doors'), stage:get(r,'stage'), notes:get(r,'notes')});
      }
      const g=groups.get(key);
      // keep the first non-empty value for the company-level fields
      ['vertical','market','doors','stage','notes'].forEach(k=>{ if(!g[k]) g[k]=get(r,k); });
      if(person.who||person.phone||person.email) g.people.push(person);
    });

    const ok=[], dupe=[];
    groups.forEach(g=>{
      // best contact first
      g.people.sort((x,y)=> y.rank-x.rank || (y.phone?1:0)-(x.phone?1:0) || (y.email?1:0)-(x.email?1:0));
      const lead=g.people[0]||{};
      const others=g.people.slice(1);

      const extra = others.length
        ? `Also at this company:\n` + others.map(p=>
            `• ${p.who||'(no name)'}${p.title?` — ${p.title}`:''}${p.phone?` · ${p.phone}`:''}${p.email?` · ${p.email}`:''}`
          ).join('\n')
        : '';

      const rec={
        id:uid(), name:g.company,
        contact:lead.who||'', title:lead.title||'',
        phone:lead.phone||'', email:lead.email||'',
        vertical: guessVertical(g.vertical) || guessVertical(g.company) || nearest(g.vertical,VERTICALS) || defVert,
        market:   guessMarket(g.market) || guessMarket(g.notes) || defMarket,
        stage:    (STAGES.find(st=>st.name.toLowerCase()===String(g.stage).toLowerCase())||{}).id || 'lead',
        doors:    parseInt(String(g.doors).replace(/[^0-9]/g,''),10)||0,
        notes:    [g.notes, extra].filter(Boolean).join('\n\n'),
        next:'', last:'', bldgs:[], created:today(),
        _people: g.people.length
      };
      if(existing.has(norm(g.company))) dupe.push(rec); else ok.push(rec);
    });

    ok.sort((x,y)=> y._people-x._people || x.name.localeCompare(y.name));
    return {ok,dupe,bad,rolled: rowCount - (ok.length+dupe.length)};
  },[rows,map,hasHead,defMarket,defVert,A]);

  const commit=async()=>{
    setBusy(true);
    const clean=built.ok.map(({_people,...rest})=>rest);   // preview-only field
    await onImport(clean);
    setBusy(false);
    onClose();
  };

  return <div className="modal" onMouseDown={e=>{if(e.target===e.currentTarget&&!busy)onClose();}}>
    <div className="sheet wide" onMouseDown={e=>e.stopPropagation()}>
      <h2>Import target list <span className="hint" style={{marginLeft:'auto',fontWeight:400,textTransform:'none',letterSpacing:0,fontFamily:'Inter'}}>Step {step} of 2</span></h2>

      {step===1 && <div className="body">
        <div className="note" style={{margin:'0 0 14px'}}>
          Paste straight from Excel or Google Sheets, or upload a CSV. The only column that's required is the company name — everything else is optional, and anything missing gets filled in from the defaults you pick on the next screen.
        </div>
        <div className="fld">
          <label>Paste your rows</label>
          <textarea rows="9" value={text} onChange={e=>setText(e.target.value)} className="mono" style={{fontSize:12}}
            placeholder={"Company\tContact\tPhone\tCity\tBuildings\nBayline Property Group\tDana Ruiz\t(415) 555-0142\tSan Francisco\t14\nSonoma Ridge HOA\tMarcus Lee\t(707) 555-0193\tPetaluma\t9"}/>
        </div>
        <div className="row" style={{gap:10,marginTop:12}}>
          <button className="btn pri" disabled={!text.trim()} onClick={()=>load(text)}>Read the rows</button>
          <span className="hint">or</span>
          <label className="btn" style={{margin:0}}>Upload a CSV<input type="file" accept=".csv,.tsv,.txt" onChange={onFile} style={{display:'none'}}/></label>
        </div>
      </div>}

      {step===2 && rows && <>
        <div className="body" style={{maxHeight:'58vh',overflow:'auto'}}>
          <div className="row" style={{justifyContent:'space-between',marginBottom:12}}>
            <label className="chk"><input type="checkbox" checked={hasHead} onChange={e=>{setHasHead(e.target.checked);setMap(autoMap(e.target.checked?rows[0]:rows[0].map((_,i)=>'')));}}/> First row is a header</label>
            <button className="btn sm" onClick={()=>{setStep(1);setRows(null);}}>Start over</button>
          </div>

          <Sect t="Match the columns" sub="I've guessed from your headers — fix anything that's wrong. If your file has First name and Last name as separate columns, map both and they'll be joined. Several rows at the same company roll up into one account."/>
          <div className="mapgrid">
            {FIELDS.map(f=><div key={f.k} className="fld">
              <label>{f.t}{f.req && <span style={{color:'var(--alarm)'}}> *</span>}</label>
              <select value={map[f.k]??''} onChange={e=>setMap({...map,[f.k]:e.target.value===''?null:+e.target.value})}>
                <option value="">— not in my file —</option>
                {head.map((h,i)=><option key={i} value={i}>{h||`Column ${i+1}`}</option>)}
              </select>
            </div>)}
          </div>

          <Sect t="Defaults" sub="Used for any row where the file doesn't say. Market and vertical are also guessed from the city and company name where possible."/>
          <div className="f2">
            <div className="fld"><label>Market</label><select value={defMarket} onChange={e=>setDefMarket(e.target.value)}>{MARKETS.map(m=><option key={m}>{m}</option>)}</select></div>
            <div className="fld"><label>Vertical</label><select value={defVert} onChange={e=>setDefVert(e.target.value)}>{VERTICALS.map(v=><option key={v}>{v}</option>)}</select></div>
          </div>

          <Sect t="Preview"/>
          <div className="row" style={{gap:8,marginBottom:8}}>
            <span className="tag g">{built.ok.length} companies</span>
            {built.rolled>0 && <span className="tag w">{built.rolled} extra contact rows merged in</span>}
            {built.dupe.length>0 && <span className="tag y">{built.dupe.length} already on the board — skipped</span>}
            {built.bad>0 && <span className="tag r">{built.bad} with no company name — skipped</span>}
          </div>
          {!built.ok.length ? <div className="hint">Nothing to import. Check that the Company column is mapped to the right column.</div> :
          <div style={{overflowX:'auto',border:'1px solid var(--line)',borderRadius:3}}>
            <table><thead><tr><th>Company</th><th>Decision-maker</th><th>Phone</th><th>Vertical</th><th>Market</th><th>Contacts</th></tr></thead>
            <tbody>{built.ok.slice(0,10).map(r=><tr key={r.id}>
              <td><b>{r.name}</b></td>
              <td>{r.contact||<span className="hint">—</span>}<div className="hint">{r.title}</div></td>
              <td className="mono" style={{fontSize:11.5}}>{r.phone||'—'}</td>
              <td style={{fontSize:11.5}}>{r.vertical}</td><td style={{fontSize:11.5}}>{r.market}</td>
              <td>{r._people>1? <span className="tag w">{r._people}</span> : <span className="mono">{r._people||'—'}</span>}</td>
            </tr>)}</tbody></table>
            {built.ok.length>10 && <div className="hint" style={{padding:'7px 9px',borderTop:'1px solid var(--line)'}}>…and {built.ok.length-10} more</div>}
          </div>}
        </div>
        <div className="foot">
          <span className="hint" style={{marginRight:'auto'}}>One account per company. The most senior contact becomes the decision-maker; the rest are saved in the account's notes. Everything lands as a <b>Lead</b>.</span>
          <button className="btn dk" onClick={onClose} disabled={busy}>Cancel</button>
          <button className="btn pri" disabled={!built.ok.length||busy} onClick={commit}>
            {busy?'Importing…':`Import ${built.ok.length} account${built.ok.length===1?'':'s'}`}
          </button>
        </div>
      </>}
    </div>
  </div>;
}

/* ---- photo capture: the reason any of this is on a server ---- */
function Photos({photos=[],onChange,meta,label}){
  const [urls,setUrls]=useState({});
  const [busy,setBusy]=useState(false);
  const [view,setView]=useState(null);

  useEffect(()=>{ let live=true;
    (async()=>{ const m={};
      for(const p of photos){ const u=await Store.photoURL(p); if(u) m[p.path||p.at]=u; }
      if(live) setUrls(m);
    })();
    return ()=>{live=false;};
  },[JSON.stringify(photos.map(p=>p.path||p.at))]);

  const add=async e=>{
    const files=[...e.target.files]; e.target.value='';
    if(!files.length) return;
    setBusy(true);
    const out=[...photos];
    for(const f of files){
      try{ out.push(await Store.uploadPhoto(f,{...meta,label})); }
      catch(err){ alert(err.message); }
    }
    onChange(out); setBusy(false);
  };
  const del=async i=>{
    if(!confirm('Delete this photo?')) return;
    await Store.deletePhoto(photos[i]);
    onChange(photos.filter((_,j)=>j!==i));
  };

  return <div className="photos">
    {photos.map((p,i)=>{const k=p.path||p.at;const u=urls[k];
      return <div key={k} className="thumb">
        {u? <img src={u} alt={label} onClick={()=>setView(u)}/> : <div className="thumbload"/>}
        <button className="thumbx" onClick={()=>del(i)} title="Delete photo">×</button>
      </div>;})}
    <label className={'shot'+(busy?' busy':'')}>
      <input type="file" accept="image/*" capture="environment" multiple onChange={add} disabled={busy}/>
      <span>{busy?'Uploading…':photos.length?'+ Photo':'Take photo'}</span>
    </label>
    {view && <div className="lightbox" onClick={()=>setView(null)}><img src={view} alt=""/></div>}
  </div>;
}


/* ---- floor plans: upload, pin the shutoffs, draw the zones ---- */
const PINK=[
  {k:'water',   t:'Water shutoff',   c:'#1E7FA6'},
  {k:'gas',     t:'Gas shutoff',     c:'#D98324'},
  {k:'elec',    t:'Electrical',      c:'#C6412C'},
  {k:'sprink',  t:'Sprinkler / FDC', c:'#2E7D4F'},
  {k:'access',  t:'Access / key',    c:'#6B21A8'},
  {k:'risk',    t:'Known risk',      c:'#0E151C'},
];
const pinC=k=>(PINK.find(p=>p.k===k)||PINK[0]).c;

function Plans({b,a,onChange}){
  const P=b.plans||[];
  const [open,setOpen]=useState(null);
  const [busy,setBusy]=useState('');

  const add=async e=>{
    const files=[...e.target.files]; e.target.value='';
    if(!files.length) return;
    const out=[...P];
    for(const file of files){
      setBusy(file.name);
      try{
        if(file.type==='application/pdf'){
          if(!window.pdfjsLib) throw new Error('The PDF reader did not load. Reload the page and try again.');
          const buf=await file.arrayBuffer();
          const pdf=await pdfjsLib.getDocument({data:buf}).promise;
          // A plan set is usually one level per page. Import each page as its own level.
          for(let n=1;n<=pdf.numPages;n++){
            const page=await pdf.getPage(n);
            const vp=page.getViewport({scale:2});     // 2x so it stays readable when zoomed
            const c=document.createElement('canvas');
            c.width=vp.width; c.height=vp.height;
            await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
            const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.82));
            const img=new File([blob],`${file.name.replace(/\.pdf$/i,'')}-p${n}.jpg`,{type:'image/jpeg'});
            const rec=await Store.uploadPhoto(img,{acct:a.name,bldg:b.name,label:'plan'});
            out.push({id:uid(),name:pdf.numPages>1?`Level ${n}`:file.name.replace(/\.pdf$/i,''),
                      img:rec,w:c.width,h:c.height,pins:[],strokes:[]});
          }
        } else if(/^image\//.test(file.type)){
          const rec=await Store.uploadPhoto(file,{acct:a.name,bldg:b.name,label:'plan'});
          const dims=await new Promise(res=>{const i=new Image();
            i.onload=()=>res({w:i.naturalWidth,h:i.naturalHeight});
            i.onerror=()=>res({w:1600,h:1200});
            i.src=URL.createObjectURL(file);});
          out.push({id:uid(),name:file.name.replace(/\.[^.]+$/,''),img:rec,w:dims.w,h:dims.h,pins:[],strokes:[]});
        } else {
          alert(`${file.name} isn't a PDF or an image.`);
        }
      }catch(err){ alert(err.message); }
    }
    setBusy('');
    onChange(out);
  };

  const del=async i=>{
    if(!confirm(`Delete "${P[i].name}"? The pins and markup on it go too.`)) return;
    await Store.deletePhoto(P[i].img);
    onChange(P.filter((_,j)=>j!==i));
  };

  return <>
    <Sect t="Floor plans" sub="Upload a PDF set or shoot the printed plan on the wall. Then pin the shutoffs onto it — that's what makes it useful at 2am."/>
    {!P.length && <div className="hint" style={{padding:'6px 0 10px'}}>No plans yet. A PDF with several pages imports as one level per page.</div>}

    <div className="plangrid">
      {P.map((p,i)=><div key={p.id} className="plancard">
        <PlanThumb p={p} onClick={()=>setOpen(i)}/>
        <div className="planfoot">
          <input value={p.name} onChange={e=>onChange(P.map((x,j)=>j===i?{...x,name:e.target.value}:x))}/>
          <div className="row" style={{justifyContent:'space-between',marginTop:5}}>
            <span className="hint">{(p.pins||[]).length} pin{(p.pins||[]).length===1?'':'s'}</span>
            <div className="row" style={{gap:4}}>
              <button className="btn sm" onClick={()=>setOpen(i)}>Mark up</button>
              <button className="btn sm dang" onClick={()=>del(i)}>×</button>
            </div>
          </div>
        </div>
      </div>)}

      <label className={'planadd'+(busy?' busy':'')}>
        <input type="file" accept="application/pdf,image/*" multiple onChange={add} disabled={!!busy}/>
        <span>{busy?`Importing ${busy}…`:'+ Add plan'}</span>
        <span className="hint" style={{fontWeight:400,textTransform:'none',letterSpacing:0}}>PDF or photo</span>
      </label>
    </div>

    {open!=null && P[open] && <PlanEditor plan={P[open]} shutoffs={b.shutoffs||[]}
      onSave={p=>onChange(P.map((x,j)=>j===open?p:x))}
      onClose={()=>setOpen(null)}/>}
  </>;
}

function PlanThumb({p,onClick}){
  const [u,setU]=useState('');
  useEffect(()=>{let live=true;Store.photoURL(p.img).then(x=>live&&setU(x));return()=>{live=false;};},[p.img?.path,p.img?.at]);
  return <div className="planthumb" onClick={onClick}>
    {u? <img src={u} alt={p.name}/> : <div className="thumbload" style={{height:'100%'}}/>}
    <svg className="pinlayer" viewBox={`0 0 ${p.w} ${p.h}`} preserveAspectRatio="xMidYMid meet">
      {(p.pins||[]).map(pin=><circle key={pin.id} cx={pin.x*p.w} cy={pin.y*p.h}
        r={Math.max(p.w,p.h)*0.014} fill={pinC(pin.kind)} stroke="#fff" strokeWidth={Math.max(p.w,p.h)*0.004}/>)}
    </svg>
  </div>;
}

/* the markup surface */
function PlanEditor({plan,shutoffs,onSave,onClose}){
  const [p,setP]=useState(plan);
  const [url,setUrl]=useState('');
  const [tool,setTool]=useState('water');   // a pin kind, or 'draw', or 'erase'
  const [drawing,setDrawing]=useState(null);
  const [sel,setSel]=useState(null);
  const wrap=useRef(null);

  useEffect(()=>{let live=true;Store.photoURL(p.img).then(x=>live&&setUrl(x));return()=>{live=false;};},[]);
  const save=np=>{setP(np);onSave(np);};

  // normalized 0..1 coords so pins survive any zoom or screen size
  const pt=e=>{
    const r=wrap.current.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:Math.min(1,Math.max(0,(t.clientX-r.left)/r.width)),
            y:Math.min(1,Math.max(0,(t.clientY-r.top)/r.height))};
  };

  const down=e=>{
    if(e.target.closest('.pinhit')) return;
    const c=pt(e);
    if(tool==='draw'){ setDrawing([c]); }
    else if(tool==='erase'){ /* handled on pin/stroke click */ }
    else {
      const pin={id:uid(),kind:tool,x:c.x,y:c.y,label:'',ref:''};
      save({...p,pins:[...(p.pins||[]),pin]});
      setSel(pin.id);
    }
  };
  const moveP=e=>{ if(drawing){ e.preventDefault(); setDrawing(d=>[...d,pt(e)]); } };
  const up=()=>{
    if(drawing){
      if(drawing.length>2) save({...p,strokes:[...(p.strokes||[]),{id:uid(),pts:drawing}]});
      setDrawing(null);
    }
  };

  const pins=p.pins||[], strokes=p.strokes||[];
  const cur=pins.find(x=>x.id===sel);
  const setPin=(id,patch)=>save({...p,pins:pins.map(x=>x.id===id?{...x,...patch}:x)});
  const delPin=id=>{save({...p,pins:pins.filter(x=>x.id!==id)});setSel(null);};

  const path=pts=>pts.map((c,i)=>`${i?'L':'M'}${(c.x*1000).toFixed(1)} ${(c.y*1000).toFixed(1)}`).join(' ');

  return <div className="modal" style={{padding:12}} onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="sheet plansheet" onMouseDown={e=>e.stopPropagation()}>
      <h2>{p.name}<span className="hint" style={{marginLeft:'auto',fontWeight:400,textTransform:'none',letterSpacing:0,fontFamily:'Inter'}}>Tap the plan to drop a pin</span></h2>

      <div className="planbar">
        {PINK.map(k=><button key={k.k} className={'tool'+(tool===k.k?' on':'')} onClick={()=>setTool(k.k)}>
          <i style={{background:k.c}}/>{k.t}
        </button>)}
        <button className={'tool'+(tool==='draw'?' on':'')} onClick={()=>setTool('draw')}><i className="pen"/>Draw zone</button>
        <button className={'tool'+(tool==='erase'?' on':'')} onClick={()=>setTool('erase')}><i className="er"/>Erase</button>
        {strokes.length>0 && <button className="btn sm" style={{marginLeft:'auto'}}
          onClick={()=>{if(confirm('Clear all drawn zones?'))save({...p,strokes:[]});}}>Clear drawing</button>}
      </div>

      <div className="planstage">
        <div className="plancanvas" ref={wrap}
          onMouseDown={down} onMouseMove={moveP} onMouseUp={up} onMouseLeave={up}
          onTouchStart={down} onTouchMove={moveP} onTouchEnd={up}
          style={{cursor:tool==='draw'?'crosshair':tool==='erase'?'not-allowed':'copy'}}>
          {url? <img src={url} alt={p.name} draggable="false"/> : <div className="thumbload" style={{height:300}}/>}

          <svg className="ink" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            {strokes.map(st=><path key={st.id} d={path(st.pts)} fill="none"
              stroke={tool==='erase'?'#C6412C':'#E8B400'} strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"
              style={{pointerEvents:tool==='erase'?'stroke':'none',cursor:'pointer',opacity:.9}}
              onClick={()=>{if(tool==='erase')save({...p,strokes:strokes.filter(x=>x.id!==st.id)});}}/>)}
            {drawing && <path d={path(drawing)} fill="none" stroke="#E8B400" strokeWidth="6" strokeLinecap="round"/>}
          </svg>

          {pins.map(pin=><button key={pin.id} className={'pinhit'+(sel===pin.id?' on':'')}
            style={{left:pin.x*100+'%',top:pin.y*100+'%',background:pinC(pin.kind)}}
            onClick={e=>{e.stopPropagation(); if(tool==='erase') delPin(pin.id); else setSel(pin.id);}}>
            {pin.label? <span className="pinlab">{pin.label}</span> : null}
          </button>)}
        </div>
      </div>

      {cur && <div className="pinedit">
        <div className="row" style={{gap:8,alignItems:'flex-end'}}>
          <div className="fld" style={{flex:1}}><label>Pin label</label>
            <input autoFocus value={cur.label} onChange={e=>setPin(cur.id,{label:e.target.value})} placeholder="Main water shutoff — behind the door"/></div>
          <div className="fld" style={{flex:1}}><label>Link to a logged shutoff</label>
            <select value={cur.ref} onChange={e=>setPin(cur.id,{ref:e.target.value})}>
              <option value="">— none —</option>
              {shutoffs.map(so=><option key={so.id} value={so.id}>{so.system}{so.loc?` — ${so.loc}`:''}</option>)}
            </select></div>
          <div className="fld" style={{flex:'none'}}><label>Type</label>
            <select value={cur.kind} onChange={e=>setPin(cur.id,{kind:e.target.value})}>
              {PINK.map(k=><option key={k.k} value={k.k}>{k.t}</option>)}
            </select></div>
          <button className="btn sm dang" onClick={()=>delPin(cur.id)}>Delete pin</button>
          <button className="btn sm" onClick={()=>setSel(null)}>Done</button>
        </div>
      </div>}

      <div className="foot">
        <span className="hint" style={{marginRight:'auto'}}>{pins.length} pin{pins.length===1?'':'s'} · {strokes.length} zone{strokes.length===1?'':'s'} · saves as you go</span>
        <button className="btn pri" onClick={onClose}>Done</button>
      </div>
    </div>
  </div>;
}




/* ---- JOB HISTORY ----
   Every project at every property. Cost is built up from documents —
   invoices, receipts, manual entries — not typed in as one guessed number.
   A margin you assembled from paper is one you can defend at year end. */

const JTYPES=['Water','Fire & smoke','Mold','Contents / pack-out','Reconstruction','Equipment rental','Other'];
const JSTATUS=[
  {k:'Active',   c:'#1E7FA6'},
  {k:'Complete', c:'#0F5D7C'},
  {k:'Invoiced', c:'#D98324'},
  {k:'Paid',     c:'#2E7D4F'},
  {k:'Disputed', c:'#C6412C'},
];
const jsC=k=>(JSTATUS.find(s=>s.k===k)||JSTATUS[0]).c;
const RKIND=['Invoice','Progress billing','Supplement','Deductible','Out of pocket'];
const CKIND=['Subcontractor','Labor','Equipment','Materials','Disposal','Permit / fee','Other'];

const newJob=(acctId,bldgId)=>({id:'j_'+uid(),acctId,bldgId:bldgId||'',ref:'',claim:'',type:JTYPES[0],title:'',
  started:today(),completed:'',status:'Active',cause:'',carrier:'',adjuster:'',responseMins:'',
  revenue:[],costs:[],docs:[],photos:[],vids:[],notes:'',created:today()});

const money=n=>n||n===0? '$'+Math.round(n).toLocaleString() : '—';
const sum=(a,k='amount')=>(a||[]).reduce((n,x)=>n+(+x[k]||0),0);
const jobRev=j=>sum(j.revenue);
const jobCost=j=>sum(j.costs);
const jobGP=j=>jobRev(j)-jobCost(j);
const jobGPpc=j=>{const r=jobRev(j);return r? Math.round(jobGP(j)/r*100) : null;};

/* ---- a file: upload, view, remove. Works for PDFs and images alike. ---- */
function Docs({list=[],onChange,meta,accept,label,compact}){
  const [busy,setBusy]=useState(false);
  const [urls,setUrls]=useState({});

  useEffect(()=>{ let live=true;
    (async()=>{ const m={};
      for(const d of list){ if(d.img||d.kind==='inline'){ const u=await Store.docURL(d); if(u) m[d.path||d.at]=u; } }
      if(live) setUrls(m);
    })();
    return ()=>{live=false;};
  },[JSON.stringify(list.map(d=>d.path||d.at))]);

  const add=async e=>{
    const files=[...e.target.files]; e.target.value='';
    if(!files.length) return;
    setBusy(true);
    const out=[...list];
    for(const f of files){
      try{ out.push(await Store.uploadDoc(f,meta)); }
      catch(err){ alert(err.message); }
    }
    onChange(out); setBusy(false);
  };
  const open=async d=>{
    const u=await Store.docURL(d);
    if(u) window.open(u,'_blank','noopener');
    else alert('Could not open that file.');
  };
  const del=async i=>{
    if(!confirm(`Remove ${list[i].name||'this file'}?`)) return;
    await Store.deleteDoc(list[i]);
    onChange(list.filter((_,j)=>j!==i));
  };
  const kb=n=>n>1048576? (n/1048576).toFixed(1)+' MB' : Math.round(n/1024)+' KB';

  return <div className="docs">
    {list.map((d,i)=>{
      const u=urls[d.path||d.at];
      return <div key={d.path||d.at||i} className={'doc'+(d.img?' img':'')}>
        {d.img && u
          ? <img src={u} alt="" onClick={()=>open(d)}/>
          : <div className="dico" onClick={()=>open(d)}>
              <span className="ext">{(d.name||'file').split('.').pop().slice(0,4).toUpperCase()}</span>
            </div>}
        {!compact && <div className="dmeta">
          <span className="dn" title={d.name} onClick={()=>open(d)}>{d.name||'file'}</span>
          {d.size>0 && <span className="hint">{kb(d.size)}</span>}
        </div>}
        <button className="dx" onClick={()=>del(i)}>×</button>
      </div>;
    })}
    <label className={'dadd'+(busy?' busy':'')}>
      <input type="file" multiple accept={accept} onChange={add} disabled={busy}/>
      <span>{busy?'Uploading…':(label||'+ File')}</span>
    </label>
  </div>;
}

  return <>
    <div className="secth">
      <div><div className="disp" style={{fontSize:17}}>{what}</div>{hint&&<div className="hint">{hint}</div>}</div>

        <div className="fld" style={{flex:1.2}}><label>Amount</label>

}

/* ---- the history: every job we've done ---- */
function Jobs({J,A,V,onSaveJob,onDeleteJob,go}){
  const [open,setOpen]=useState(null);
  const [q,setQ]=useState(''),[st,setSt]=useState(''),[ty,setTy]=useState('');

  const signed=A.filter(a=>stageIx(a.stage)>=4);
  const acctOf=j=>A.find(a=>a.id===j.acctId);
  const bldgOf=j=>{const a=acctOf(j);return a&&(a.bldgs||[]).find(b=>b.id===j.bldgId);};

  const list=useMemo(()=>J.filter(j=>{
    const a=acctOf(j);
    return (!q||`${a?.name||''} ${j.ref} ${j.title} ${j.claim}`.toLowerCase().includes(q.toLowerCase()))
        && (!st||j.status===st) && (!ty||j.type===ty);
  }).sort((x,y)=>(y.started||'').localeCompare(x.started||'')),[J,q,st,ty,A]);

  const rev=sum(list.map(j=>({amount:jobRev(j)})));
  const cost=sum(list.map(j=>({amount:jobCost(j)})));
  const gp=rev-cost;
  const pc=rev? Math.round(gp/rev*100):null;
  const open_=list.filter(j=>j.status==='Active').length;
  const unpaid=list.filter(j=>j.status==='Invoiced'||j.status==='Disputed');
  const owed=sum(unpaid.map(j=>({amount:jobRev(j)})));

  const add=()=>{
    if(!signed.length){ alert('No signed clients yet. Jobs attach to an account.'); return; }
    setOpen(newJob(signed[0].id,''));
  };

  if(!J.length) return <div className="card"><div className="empty">
    <b>No jobs logged</b>
    Every project you do at a property — what it was, what it cost, what you billed, and the paper behind it.
    This is what the quarterly value report is built from, and it's the proof you show the next prospect.
    <div style={{marginTop:14}}><button className="btn pri" onClick={add}>Log the first job</button></div>
  </div></div>;

  return <div className="grid">
    <div className="kpis">
      <Kpi lab="Billed" val={money(rev)} sub={`${list.length} job${list.length===1?'':'s'}`}/>
      <Kpi lab="Gross profit" val={money(gp)} sub={pc!=null?`${pc}% margin`:'no revenue yet'} cls={pc==null?'':pc>=40?'go':pc>=25?'':'al'}/>
      <Kpi lab="Active" val={open_} sub="jobs running now" cls="hz"/>
      <Kpi lab="Waiting on payment" val={money(owed)} sub={`${unpaid.length} invoiced or disputed`} cls={owed?'al':''}/>
    </div>

    <div className="card">
      <h3>Job history <span className="mono" style={{fontSize:12,color:'var(--mute)'}}>{list.length}</span>
        <button className="btn sm pri" style={{marginLeft:'auto'}} onClick={add}>+ Log a job</button>
      </h3>
      <div className="body">
        <div className="bar">
          <input placeholder="Search jobs…" value={q} onChange={e=>setQ(e.target.value)} style={{minWidth:200}}/>
          <select value={st} onChange={e=>setSt(e.target.value)}><option value="">All statuses</option>{JSTATUS.map(s=><option key={s.k}>{s.k}</option>)}</select>
          <select value={ty} onChange={e=>setTy(e.target.value)}><option value="">All types</option>{JTYPES.map(t=><option key={t}>{t}</option>)}</select>
        </div>

        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Job</th><th>Client</th><th>Type</th><th>Started</th><th>Billed</th><th>Cost</th><th>GP</th><th>Status</th><th></th></tr></thead>
          <tbody>{list.map(j=>{
            const a=acctOf(j), b=bldgOf(j);
            const r=jobRev(j), c=jobCost(j), g=r-c, p=jobGPpc(j);
            return <tr key={j.id}>
              <td><b style={{cursor:'pointer'}} onClick={()=>setOpen(j)}>{j.ref||'(no number)'}</b>
                <div className="hint" style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{j.title||'—'}</div></td>
              <td>{a?a.name:<span className="hint">deleted</span>}<div className="hint">{b?b.name:''}</div></td>
              <td><span className="tag">{j.type.split(' ')[0]}</span></td>
              <td className="mono" style={{fontSize:11.5}}>{j.started||'—'}</td>
              <td className="mono">{money(r)}</td>
              <td className="mono" style={{color:c?'var(--ink)':'var(--mute)'}}>{c?money(c):'—'}</td>
              <td className="mono" style={{fontWeight:700,color:p==null?'var(--mute)':p>=40?'var(--go)':p>=25?'var(--water)':'var(--alarm)'}}>
                {r? <>{money(g)}<div className="hint" style={{fontFamily:'Inter'}}>{p}%</div></> : '—'}</td>
              <td><span className="tag" style={{background:jsC(j.status),color:'#fff'}}>{j.status}</span></td>
              <td><button className="btn sm" onClick={()=>setOpen(j)}>Open</button></td>
            </tr>;})}
          </tbody>
        </table></div>

        <div className="hint" style={{marginTop:10}}>
          Margin is only as honest as the costs you log. A job showing 100% is a job missing its sub invoices.
        </div>
      </div>
    </div>

    {open && <JobShell j={open} A={A} V={V} signed={signed}
      onSave={onSaveJob} onClose={()=>setOpen(null)}
      onDelete={id=>{onDeleteJob(id);setOpen(null);}}/>}
  </div>;
}

/* picks the account/building first if the job is new */
function JobShell({j,A,V,signed,onSave,onClose,onDelete}){
  const [f,setF]=useState(j);
  const a=A.find(x=>x.id===f.acctId);
  const bl=a?(a.bldgs||[]):[];
  const b=bl.find(x=>x.id===f.bldgId);
  const isNew=!j.ref && !jobRev(j) && !(j.docs||[]).length;

  if(isNew && !f._ready) return <div className="modal" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="sheet" onMouseDown={e=>e.stopPropagation()}>
      <h2>Log a job</h2>
      <div className="body">
        <div className="fld"><label>Which client</label>
          <select value={f.acctId} onChange={e=>setF({...f,acctId:e.target.value,bldgId:''})}>
            {signed.map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
          </select></div>
        <div className="fld"><label>Which building</label>
          <select value={f.bldgId} onChange={e=>setF({...f,bldgId:e.target.value})}>
            <option value="">— not building-specific —</option>
            {bl.map(x=><option key={x.id} value={x.id}>{x.name||'Untitled'}</option>)}
          </select>
          {!bl.length && <div className="hint">This client has no buildings logged yet. That's fine — you can attach the job to the account.</div>}
        </div>
      </div>
      <div className="foot">
        <button className="btn dk" onClick={onClose}>Cancel</button>
        <button className="btn pri" onClick={()=>{const nf={...f,_ready:true};setF(nf);onSave(nf);}}>Continue</button>
      </div>
    </div>
  </div>;

  return <Job j={f} a={a} b={b} V={V} onSave={x=>{setF(x);onSave(x);}} onClose={onClose} onDelete={onDelete}/>;
}

/* ---- VENDOR DIRECTORY ---- 
   One record per vendor company. Buildings link by id. Two jobs:
   the subcontractor bench, and the referral pipeline. A plumber on a
   client's vendor list is standing in the building at the moment of loss —
   that's the best referral source there is, and right now they're calling
   somebody else. */

const VCATS=[
  {k:'Plumber',        ref:true,  d:'In the building when the pipe lets go. The best referral source we have.'},
  {k:'Electrician',    ref:true,  d:''},
  {k:'HVAC',           ref:true,  d:''},
  {k:'Fire / sprinkler',ref:true, d:'Sprinkler discharges are our work. They find them first.'},
  {k:'Roofer',         ref:true,  d:'Roof leaks become ceiling losses.'},
  {k:'General contractor',ref:true,d:''},
  {k:'Elevator',       ref:false, d:''},
  {k:'Alarm / monitoring',ref:true,d:'The alarm fires before anyone is on site.'},
  {k:'Janitorial / facilities',ref:true,d:'Night crew finds the water first.'},
  {k:'Landscaper / irrigation',ref:false,d:''},
  {k:'Insurance carrier',ref:false,d:''},
  {k:'Insurance agent',ref:true, d:'They tell the client who to call.'},
  {k:'Adjuster / TPA',  ref:true, d:''},
  {k:'Indoor environmental pro (IEP)',ref:false,d:'We do not clear what we remediate. Keep them independent.'},
  {k:'Abatement — asbestos / lead',ref:false,d:''},
  {k:'Structural engineer',ref:false,d:''},
  {k:'Locksmith',      ref:false,d:''},
  {k:'Security',       ref:false,d:''},
  {k:'Other',          ref:false,d:''},
];
const catRef=k=>(VCATS.find(c=>c.k===k)||{}).ref;
const newVendor=()=>({id:'v_'+uid(),name:'',cat:VCATS[0].k,contact:'',title:'',phone:'',afterHours:'',email:'',
  market:MARKETS[0],license:'',insured:false,ourSub:false,theirVendor:true,referralAcctId:'',rating:0,notes:'',created:today()});

/* every building that links to this vendor */
function vendorSites(vid,A){
  const out=[];
  A.forEach(a=>(a.bldgs||[]).forEach(b=>{
    if((b.vendors||[]).some(x=>x.vid===vid)) out.push({a,b});
  }));
  return out;
}

function Vendors({V,A,onSaveVendor,onDeleteVendor,onSaveAccount,go}){
  const [q,setQ]=useState(''),[cat,setCat]=useState(''),[view,setView]=useState('all');
  const [edit,setEdit]=useState(null);

  const counts=useMemo(()=>{
    const m={}; V.forEach(v=>{m[v.cat]=(m[v.cat]||0)+1;});
    return VCATS.filter(c=>m[c.k]).map(c=>[c.k,m[c.k]]);
  },[V]);

  const list=useMemo(()=>{
    let L=V.filter(v=>
      (!q||`${v.name} ${v.contact} ${v.phone} ${v.notes}`.toLowerCase().includes(q.toLowerCase())) &&
      (!cat||v.cat===cat) &&
      (view!=='sub'||v.ourSub) &&
      (view!=='ref'||(catRef(v.cat)&&!v.referralAcctId)) &&
      (view!=='signed'||v.referralAcctId)
    );
    return L.map(v=>({...v,sites:vendorSites(v.id,A).length}))
            .sort((a,b)=> b.sites-a.sites || a.name.localeCompare(b.name));
  },[V,q,cat,view,A]);

  // the pitch: vendors touching the most of our buildings, who aren't referral partners yet
  const opportunity=useMemo(()=>
    V.map(v=>({...v,sites:vendorSites(v.id,A).length}))
     .filter(v=>catRef(v.cat)&&!v.referralAcctId&&v.sites>0)
     .sort((a,b)=>b.sites-a.sites).slice(0,5)
  ,[V,A]);

  const subs=V.filter(v=>v.ourSub).length;
  const linked=V.filter(v=>vendorSites(v.id,A).length>0).length;
  const partners=V.filter(v=>v.referralAcctId).length;

  /* Push a vendor onto the BD board as a referral target. */
  const toBoard=v=>{
    const sites=vendorSites(v.id,A);
    const where=sites.slice(0,6).map(s=>`• ${s.a.name} — ${s.b.name||'building'}`).join('\n');
    const acct={
      id:uid(), name:v.name,
      vertical: v.cat==='Plumber'? 'Plumbing Partner'
              : /insur|adjust/i.test(v.cat)? 'Insurance / Adjuster'
              : /contractor/i.test(v.cat)? 'General Contractor' : 'Other',
      market:v.market, contact:v.contact, title:v.title, phone:v.phone, email:v.email,
      stage:'lead', doors:0, last:'', next:'Call about a referral partnership',
      notes:[
        `Referral target — ${v.cat}.`,
        sites.length? `Already inside ${sites.length} of our building${sites.length===1?'':'s'}:\n${where}${sites.length>6?`\n…and ${sites.length-6} more`:''}` : '',
        `They are in the building at the moment of loss. Right now the customer is googling "water damage" at 11pm.`,
        v.notes
      ].filter(Boolean).join('\n\n'),
      bldgs:[], created:today()
    };
    onSaveAccount(acct);
    onSaveVendor({...v, referralAcctId:acct.id});
    alert(`${v.name} is on the board as a Lead.\n\nThe pitch is in the notes: they're already inside ${sites.length} of your buildings.`);
  };

  return <div className="grid">
    <div className="kpis">
      <Kpi lab="Vendors" val={V.length} sub={`${linked} attached to a building`}/>
      <Kpi lab="Our subcontractors" val={subs} sub="we hire these" cls="hz"/>
      <Kpi lab="Referral partners" val={partners} sub="on the BD board" cls={partners?'go':''}/>
      <Kpi lab="Referral targets" val={opportunity.length} sub="inside our buildings, not ours yet" cls={opportunity.length?'al':''}/>
    </div>

    {opportunity.length>0 && <div className="card">
      <h3>Worth a call
        <span className="hint" style={{fontWeight:400,textTransform:'none',letterSpacing:0,fontFamily:'Inter'}}>
          — these vendors are already inside our buildings and aren't sending us work
        </span>
      </h3>
      <div className="body">
        {opportunity.map(v=><div key={v.id} className="oprow">
          <div style={{flex:1,minWidth:0}}>
            <b>{v.name}</b> <span className="tag">{v.cat}</span>
            <div className="hint">
              Inside <b>{v.sites}</b> of our building{v.sites===1?'':'s'} · {v.contact||'no contact yet'}{v.phone?` · ${v.phone}`:''}
            </div>
          </div>
          <button className="btn sm pri" onClick={()=>toBoard(v)}>Add as referral target</button>
        </div>)}
        <div className="hint" style={{marginTop:8}}>
          A plumber standing in the building when the pipe breaks is worth more than any list you can buy.{' '}
          <button className="plink" onClick={()=>go('p-emails')}>The plumbing partner email →</button>
        </div>
      </div>
    </div>}

    <div className="card">
      <h3>Vendor directory <span className="mono" style={{fontSize:12,color:'var(--mute)'}}>{list.length}</span>
        <button className="btn sm pri" style={{marginLeft:'auto'}} onClick={()=>setEdit(newVendor())}>+ Add vendor</button>
      </h3>
      <div className="body">
        <div className="filters">
          <div className="frow">
            <span className="flabel">Show</span>
            <div className="chips">
              {[['all','Everyone'],['sub','Our subs'],['ref','Referral targets'],['signed','Referral partners']].map(([k,l])=>
                <button key={k} className={'chip'+(view===k?' on':'')} onClick={()=>setView(k)}>{l}</button>)}
            </div>
          </div>
          <div className="frow">
            <span className="flabel">Trade</span>
            <div className="chips">
              <button className={'chip'+(!cat?' on':'')} onClick={()=>setCat('')}>All</button>
              {counts.map(([c,n])=><button key={c} className={'chip'+(cat===c?' on':'')} onClick={()=>setCat(cat===c?'':c)}>
                {c.split(' /')[0]} <b>{n}</b></button>)}
            </div>
          </div>
          <div className="frow">
            <input placeholder="Search vendors…" value={q} onChange={e=>setQ(e.target.value)} style={{maxWidth:240}}/>
          </div>
        </div>

        {!list.length ? <div className="empty">
          <b>{V.length? 'Nothing matches' : 'No vendors yet'}</b>
          {V.length? 'Clear a filter.' : "Add the plumber you already use, then start logging the ones your clients use — that's where the referrals are."}
        </div> :
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr><th>Vendor</th><th>Trade</th><th>Contact</th><th>Phone</th><th>Buildings</th><th>Role</th><th></th></tr></thead>
          <tbody>{list.map(v=>{
            const sites=vendorSites(v.id,A);
            return <tr key={v.id}>
              <td><b style={{cursor:'pointer'}} onClick={()=>setEdit(v)}>{v.name}</b>
                <div className="hint">{v.market}{v.license?` · ${v.license}`:''}</div></td>
              <td><span className="tag">{v.cat}</span></td>
              <td>{v.contact||<span className="hint">—</span>}<div className="hint">{v.title}</div></td>
              <td className="mono" style={{fontSize:11.5}}>{v.phone||'—'}{v.afterHours&&<div className="hint" style={{fontFamily:'Inter'}}>24h: {v.afterHours}</div>}</td>
              <td>{sites.length? <span className="tag w" title={sites.map(s=>`${s.a.name} — ${s.b.name}`).join('\n')}>{sites.length}</span> : <span className="hint">—</span>}</td>
              <td><div className="row" style={{gap:4}}>
                {v.ourSub && <span className="tag g">Our sub</span>}
                {v.referralAcctId && <span className="tag y">Partner</span>}
                {catRef(v.cat)&&!v.referralAcctId&&sites.length>0 && <span className="tag r">Target</span>}
              </div></td>
              <td><button className="btn sm" onClick={()=>setEdit(v)}>Open</button></td>
            </tr>;})}
          </tbody>
        </table></div>}
      </div>
    </div>

    {edit && <VendorEdit v={edit} A={A} onClose={()=>setEdit(null)}
      onSave={v=>{onSaveVendor(v);setEdit(null);}}
      onDelete={id=>{onDeleteVendor(id);setEdit(null);}}
      onToBoard={toBoard}/>}
  </div>;
}

              <input type="checkbox" checked={f.theirVendor} onChange={e=>u('theirVendor',e.target.checked)}/>

          <textarea rows="2" value={f.notes} onChange={e=>u('notes',e.target.value)}

        <div className="vsites">
          <div className="disp" style={{fontSize:15,marginBottom:6}}>
            Inside {sites.length} of our building{sites.length===1?'':'s'}

          {sites.length? <>
            {sites.slice(0,8).map(({a,b})=><div key={b.id} className="hint" style={{padding:'2px 0'}}>
              • <b style={{color:'var(--ink)'}}>{a.name}</b> — {b.name||'building'}
            </div>)}
            {sites.length>8 && <div className="hint">…and {sites.length-8} more</div>}
          </> : <div className="hint">Not attached to any building yet. Add them from a building's Stage 3 in Data mining.</div>}

          {catRef(f.cat) && !f.referralAcctId && <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--line)'}}>
            <div className="hint" style={{marginBottom:7}}>
              {sites.length
                ? <>They're standing in <b>{sites.length}</b> of our buildings. Right now the customer is calling somebody else at 11pm.</>
                : <>A {f.cat.toLowerCase()} is a referral channel whether or not they're on one of our buildings.</>}
            </div>
            <button className="btn pri" style={{width:'100%'}} onClick={()=>{onSave(f);onToBoard(f);}}>

      </div>
      <div className="foot">
        {v.name && <button className="btn dang" style={{marginRight:'auto'}}
          onClick={()=>{if(confirm(`Delete ${v.name}? Buildings that link to them will lose the link.`))onDelete(v.id);}}>Delete</button>}
        <button className="btn dk" onClick={onClose}>Cancel</button>
        <button className="btn pri" onClick={save}>Save vendor</button>
      </div>
    </div>
  </div>;
}

/* attach vendors to a building — replaces the old free-text list */
function BldgVendors({b,V,onChange,onNewVendor}){

  return <>
    <Sect t="Vendors on this building" sub="Who does this client already use? We do not compete with them — we call them, and we make them look good. Every one of these is also a referral channel."

            {v.referralAcctId && <span className="tag y" style={{marginLeft:4}}>Referral partner</span>}

              {v.contact||'no contact'}{v.phone?` · ${v.phone}`:''}{v.afterHours?` · 24h ${v.afterHours}`:''}
