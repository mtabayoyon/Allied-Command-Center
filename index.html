<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}</script>
<script src="./js/config.js"></script>
<script src="./js/store.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --ink:#0E151C;
  --slab:#18232E;
  --slab2:#22303D;
  --line:#CBD3DA;
  --line-d:#33434F;
  --paper:#EDF0F2;
  --card:#FFFFFF;
  --mute:#6B7A87;
  --hiviz:#FFD400;
  --water:#1E7FA6;
  --alarm:#C6412C;
  --go:#2E7D4F;
  --warn:#D98324;
}
*{box-sizing:border-box}
#root{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;font-size:14px;line-height:1.5}
h1,h2,h3,.disp{font-family:'Barlow Condensed','Inter',sans-serif;text-transform:uppercase;letter-spacing:.03em;margin:0}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:2px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--water);outline-offset:-1px}

/* ---- hazard bar signature ---- */
.hazard{height:6px;background:repeating-linear-gradient(-45deg,var(--hiviz) 0 14px,var(--ink) 14px 28px)}

header.top{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{font-family:'Barlow Condensed';font-weight:700;font-size:26px;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.brand b{color:var(--hiviz)}
.tagline{font-size:11px;color:#8FA0AD;text-transform:uppercase;letter-spacing:.14em;margin-top:3px}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--line-d);background:var(--slab2);color:#DDE5EA;padding:7px 12px;border-radius:2px;font-size:12px;font-weight:600;letter-spacing:.03em}
.btn:hover{background:var(--slab)}
.btn.pri{background:var(--hiviz);color:var(--ink);border-color:var(--hiviz)}
.btn.pri:hover{background:#E8C200}
.btn.gh{background:transparent}
.btn.sm{padding:4px 8px;font-size:11px}
.btn.dang{border-color:var(--alarm);color:#F0A79B}
.btn.dang:hover{background:var(--alarm);color:#fff}

nav.tabs{display:flex;background:var(--slab);border-bottom:1px solid var(--line-d);overflow-x:auto}
nav.tabs button{background:none;border:none;color:#93A4B1;padding:12px 18px;font-family:'Barlow Condensed';font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:3px solid transparent;white-space:nowrap}
nav.tabs button:hover{color:#fff}
nav.tabs button.on{color:#fff;border-bottom-color:var(--hiviz);background:var(--slab2)}

main{padding:20px;max-width:1500px;margin:0 auto}
.grid{display:grid;gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:3px}
.card>h3{padding:10px 14px;border-bottom:1px solid var(--line);font-size:16px;display:flex;align-items:center;gap:8px}
.card .body{padding:14px}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:#fff;border:1px solid var(--line);border-left:4px solid var(--water);padding:12px 14px;border-radius:3px}
.kpi .lab{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--mute);font-weight:600}
.kpi .val{font-family:'Barlow Condensed';font-size:34px;font-weight:700;line-height:1.05;margin-top:2px}
.kpi .sub{font-size:11px;color:var(--mute)}
.kpi.hz{border-left-color:var(--hiviz)}
.kpi.al{border-left-color:var(--alarm)}
.kpi.go{border-left-color:var(--go)}

/* progress */
.meter{height:8px;background:#DEE4E8;border-radius:1px;overflow:hidden;margin-top:6px}
.meter i{display:block;height:100%;background:var(--water);transition:width .4s ease}
.meter i.done{background:var(--go)}
.meter i.low{background:var(--alarm)}

/* board */
.board{display:grid;grid-template-columns:repeat(6,minmax(180px,1fr));gap:10px;overflow-x:auto}
.col{background:#E2E7EA;border:1px solid var(--line);border-radius:3px;min-height:140px;display:flex;flex-direction:column}
.col.over{outline:2px dashed var(--water);outline-offset:-3px;background:#DDEAF0}
.colhead{padding:8px 10px;background:var(--slab);color:#fff;font-family:'Barlow Condensed';font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--stripe,transparent)}
.colhead .n{font-family:'JetBrains Mono';font-size:12px;background:rgba(255,255,255,.14);padding:1px 6px;border-radius:2px}
.colbody{padding:8px;display:flex;flex-direction:column;gap:7px;flex:1}
.acct{background:#fff;border:1px solid var(--line);border-left:3px solid var(--line);border-radius:2px;padding:8px 9px;cursor:grab;font-size:12px}
.acct:active{cursor:grabbing}
.acct:hover{border-color:var(--water);box-shadow:0 1px 4px rgba(0,0,0,.10)}
.acct .nm{font-weight:700;font-size:12.5px;line-height:1.25}
.acct .mt{color:var(--mute);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.acct .fo{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:10px}
.acct.stale{border-left-color:var(--warn)}
.acct.hot{border-left-color:var(--alarm)}
.acct.fresh{border-left-color:var(--go)}
.days{font-family:'JetBrains Mono';font-size:10px;padding:1px 5px;border-radius:2px;background:#EDF0F2;color:var(--mute)}
.days.warn{background:#FBEBD8;color:#8C5310}
.days.bad{background:#F7DDD8;color:#8E2C1C}

.tag{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;padding:2px 5px;border-radius:2px;background:#E4E9EC;color:#46545F}
.tag.w{background:#DCEDF5;color:#0F5D7C}
.tag.y{background:#FFF3C4;color:#7A5C00}
.tag.r{background:#F7DDD8;color:#8E2C1C}
.tag.g{background:#DAEEE2;color:#1E5C39}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-family:'Barlow Condensed';font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);border-bottom:2px solid var(--line);padding:7px 8px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--ink)}
td{border-bottom:1px solid #E6EAED;padding:7px 8px;vertical-align:middle}
tr:hover td{background:#F6F8F9}

.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--mute);font-weight:600}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.modal{position:fixed;inset:0;background:rgba(14,21,28,.72);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;z-index:50}
.sheet{background:#fff;border-radius:3px;width:100%;max-width:680px;border-top:5px solid var(--hiviz)}
.sheet h2{padding:14px 18px;border-bottom:1px solid var(--line);font-size:20px}
.sheet .body{padding:18px;display:flex;flex-direction:column;gap:12px}
.sheet .foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;background:#F6F8F9}
.dk{background:var(--slab2);color:#DDE5EA;border-color:var(--line-d)}

.tick{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:2px;background:#fff}
.tick input{width:16px;height:16px;flex:none;accent-color:var(--go)}
.tick .t{flex:1;font-size:12.5px}
.tick.done{background:#F1F7F3;border-color:#BFDCC9}
.tick.done .t{text-decoration:line-through;color:var(--mute)}

.empty{padding:34px 16px;text-align:center;color:var(--mute);font-size:13px}
.empty b{display:block;font-family:'Barlow Condensed';font-size:19px;text-transform:uppercase;color:var(--ink);margin-bottom:5px}
.hint{font-size:11px;color:var(--mute)}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.bar input,.bar select{width:auto;min-width:130px}
.split{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #EAEEF0;font-size:12.5px}
.stat:last-child{border:none}
.stat b{font-family:'JetBrains Mono';font-size:12.5px}
.funnel{display:flex;flex-direction:column;gap:5px}
.fstep{display:flex;align-items:center;gap:8px}
.fbar{height:24px;background:var(--water);display:flex;align-items:center;padding:0 8px;color:#fff;font-family:'JetBrains Mono';font-size:11px;font-weight:700;min-width:26px;border-radius:1px}
.flab{width:88px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);font-weight:600;text-align:right;flex:none}
/* playbook */
.reader{display:grid;grid-template-columns:250px 1fr;gap:14px;align-items:start}
.toc{background:#fff;border:1px solid var(--line);border-radius:3px;padding:12px;position:sticky;top:14px;max-height:calc(100vh - 30px);overflow:auto}
.tocgrp{margin-bottom:12px}
.tochead{font-family:'Barlow Condensed';font-size:12px;text-transform:uppercase;letter-spacing:.13em;color:var(--mute);font-weight:600;padding:4px 6px;border-bottom:1px solid var(--line);margin-bottom:4px}
.tocitem{display:block;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;padding:6px 8px;font-size:12.5px;color:#3C4A55;border-radius:0 2px 2px 0;line-height:1.35}
.tocitem:hover{background:#F1F4F6;color:var(--ink)}
.tocitem.on{background:#EAF2F6;border-left-color:var(--hiviz);color:var(--ink);font-weight:600}
.tocg{display:block;font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}

.prose{font-size:14px;line-height:1.65;color:#26313A;max-width:74ch}
.prose p{margin:0 0 12px}
.prose ul,.prose ol{margin:0 0 14px;padding-left:22px}
.prose li{margin-bottom:6px}
.prose b{color:var(--ink)}
.prose table{margin:4px 0 16px;border:1px solid var(--line)}
.prose th{background:#F3F6F7;cursor:default;padding:8px 10px}
.prose td{padding:8px 10px;font-size:13px;line-height:1.5;vertical-align:top}
.prose blockquote{margin:0 0 14px;padding:12px 16px;background:#F4F7F9;border-left:4px solid var(--water);font-size:14.5px;line-height:1.6}
.prose .note{background:#FFF9DE;border-left:4px solid var(--hiviz);padding:10px 14px;font-size:13px;margin:0 0 14px}
.prose .script{background:#F1F4F6;border:1px dashed #A9B6C0;border-radius:3px;padding:14px 16px 30px;margin:0 0 16px;cursor:copy;position:relative;transition:background .15s}
.prose .script:hover{background:#E9EFF3;border-color:var(--water)}
.prose .script p{margin:0 0 10px;font-size:14px}
.prose .script p:last-child{margin:0}
.prose .script:after{content:'Click to copy';position:absolute;bottom:8px;right:12px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mute);font-weight:600}
.prose .script:hover:after{color:var(--water)}
.pager{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--line);background:#F6F8F9}
.pager .btn{color:var(--ink);background:#fff;border-color:var(--line)}
.pager .btn.pri{background:var(--hiviz);border-color:var(--hiviz)}
.copied{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--go)}
.plink{background:none;border:none;color:var(--water);font-size:11.5px;font-weight:600;padding:0;text-decoration:underline;text-underline-offset:2px}
.plink:hover{color:var(--ink)}


/* data mining */
.dmbar{display:flex;gap:5px;width:100%}
.dmseg{flex:1;display:flex;flex-direction:column;gap:2px;align-items:center}
.dmtrk{width:100%;height:6px;background:#DEE4E8;border-radius:1px;overflow:hidden}
.dmtrk i{display:block;height:100%;transition:width .35s ease}
.dmlab{font-family:'JetBrains Mono';font-size:8.5px;color:var(--mute);letter-spacing:.04em}
.acctblk{border:1px solid var(--line);border-radius:3px;margin-bottom:12px;overflow:hidden}
.acctblk-h{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 12px;background:#F3F6F7;border-bottom:1px solid var(--line);flex-wrap:wrap}
.blist{display:flex;flex-direction:column}
.brow{display:flex;align-items:center;gap:12px;padding:9px 12px;border-bottom:1px solid #EDF0F2;cursor:pointer}
.brow:last-child{border-bottom:none}
.brow:hover{background:#F6F9FA}
.dmsum{border:1px solid var(--line);border-radius:3px;padding:12px;background:#F6F8F9}

.sheet.wide{max-width:880px}
.sheet h2{display:flex;align-items:center;gap:6px}
.stagetabs{display:flex;border-bottom:1px solid var(--line);background:#F3F6F7}
.stagetabs button{flex:1;background:none;border:none;border-bottom:3px solid transparent;padding:9px 10px;text-align:left;display:flex;flex-direction:column;gap:1px;position:relative}
.stagetabs button:hover{background:#EAEFF2}
.stagetabs button.on{background:#fff;border-bottom-color:var(--hiviz)}
.stagetabs .sn{font-family:'Barlow Condensed';font-size:11px;text-transform:uppercase;letter-spacing:.11em;color:var(--mute);font-weight:600}
.stagetabs .stt{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.25}
.stagetabs .spc{position:absolute;top:8px;right:10px;font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--mute)}
.stagetabs .spc.ok{color:var(--go)}
.secth{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--line)}
.secth:first-child{margin-top:0}
.rowcard{border:1px solid var(--line);border-left:3px solid var(--water);border-radius:2px;padding:10px;margin-bottom:8px;background:#FBFCFC}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;cursor:pointer}
.chk input{width:15px;height:15px;accent-color:var(--go)}
.ord{width:22px;height:22px;flex:none;background:var(--ink);color:var(--hiviz);font-family:'JetBrains Mono';font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border-radius:2px;margin-bottom:7px}
.note{background:#FFF9DE;border-left:4px solid var(--hiviz);padding:9px 13px;font-size:12.5px;line-height:1.5}


/* auth + splash */
.splash{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:30px}
.splash p{color:var(--mute);font-size:13px}
.gatecard{background:#fff;border:1px solid var(--line);border-top:5px solid var(--hiviz);border-radius:3px;padding:28px;max-width:380px;width:100%;text-align:center}
.gateerr{background:#FDF1EF;border-left:4px solid var(--alarm);padding:12px 14px;text-align:left;margin:16px 0;font-size:12.5px;line-height:1.55}
.gateerr b{display:block;margin-bottom:4px;font-size:13px}
.gateerr p{margin:0;color:#6B4038}

/* photos */
.photos{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:4px}
.thumb{position:relative;width:64px;height:64px;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#E6EAED;flex:none}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
.thumbload{width:100%;height:100%;background:linear-gradient(90deg,#E6EAED 25%,#F2F5F6 50%,#E6EAED 75%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.thumbx{position:absolute;top:1px;right:1px;width:17px;height:17px;line-height:15px;border:none;border-radius:2px;background:rgba(14,21,28,.72);color:#fff;font-size:13px;padding:0}
.thumbx:hover{background:var(--alarm)}
.shot{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border:1.5px dashed #9FADB8;border-radius:2px;cursor:pointer;flex:none;background:#F6F8F9;text-align:center}
.shot:hover{border-color:var(--water);background:#EAF2F6}
.shot input{display:none}
.shot span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);line-height:1.25;padding:0 4px}
.shot:hover span{color:var(--water)}
.shot.busy{opacity:.6;cursor:wait}
.lightbox{position:fixed;inset:0;background:rgba(14,21,28,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:24px;cursor:zoom-out}
.lightbox img{max-width:100%;max-height:100%;border-radius:3px}


/* importer */
.mapgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:6px}

/* floor plans */
.plangrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.plancard{border:1px solid var(--line);border-radius:3px;overflow:hidden;background:#fff}
.planthumb{position:relative;height:110px;background:#E6EAED;cursor:pointer;overflow:hidden}
.planthumb img{width:100%;height:100%;object-fit:contain;display:block;background:#fff}
.planthumb:hover{outline:2px solid var(--water);outline-offset:-2px}
.pinlayer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.planfoot{padding:7px}
.planfoot input{font-size:12px;font-weight:600;padding:4px 6px}
.planadd{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:150px;border:1.5px dashed #9FADB8;border-radius:3px;cursor:pointer;background:#F6F8F9;text-align:center;padding:10px}
.planadd:hover{border-color:var(--water);background:#EAF2F6}
.planadd input{display:none}
.planadd>span:first-of-type{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mute)}
.planadd:hover>span:first-of-type{color:var(--water)}
.planadd.busy{opacity:.65;cursor:wait}

.sheet.plansheet{max-width:1100px}
.planbar{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--line);background:#F3F6F7;flex-wrap:wrap;align-items:center}
.tool{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:2px;padding:5px 9px;font-size:11.5px;font-weight:600;color:#46545F}
.tool:hover{border-color:var(--water)}
.tool.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tool i{width:11px;height:11px;border-radius:50%;display:block;flex:none}
.tool i.pen{border-radius:1px;background:#E8B400}
.tool i.er{border-radius:1px;background:#fff;border:1.5px solid var(--alarm)}
.planstage{background:#4A5661;padding:12px;max-height:60vh;overflow:auto;display:flex;justify-content:center}
.plancanvas{position:relative;display:inline-block;max-width:100%;user-select:none;-webkit-user-select:none;touch-action:none;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.3)}
.plancanvas img{display:block;max-width:100%;height:auto;pointer-events:none}
.ink{position:absolute;inset:0;width:100%;height:100%}
.pinhit{position:absolute;width:22px;height:22px;margin:-11px 0 0 -11px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45);padding:0;cursor:pointer;transition:transform .12s}
.pinhit:hover{transform:scale(1.25)}
.pinhit.on{transform:scale(1.35);box-shadow:0 0 0 3px var(--hiviz),0 1px 5px rgba(0,0,0,.45)}
.pinlab{position:absolute;left:26px;top:50%;transform:translateY(-50%);background:rgba(14,21,28,.9);color:#fff;font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:2px;white-space:nowrap;pointer-events:none}
.pinedit{padding:10px 14px;border-top:1px solid var(--line);background:#FFF9DE}


/* board filters */
.filters{border:1px solid var(--line);border-radius:3px;background:#F6F8F9;padding:9px 11px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.flabel{font-family:'Barlow Condensed';font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--mute);font-weight:600;width:56px;flex:none}
.chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.chip{background:#fff;border:1px solid var(--line);border-radius:2px;padding:4px 9px;font-size:11.5px;font-weight:600;color:#46545F;display:flex;align-items:center;gap:5px}
.chip b{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--mute)}
.chip:hover{border-color:var(--water);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.on b{color:var(--hiviz)}
.chip.on.al{background:var(--alarm);border-color:var(--alarm)}


/* client portal */
.sharebox{border:1px solid var(--line);border-left:4px solid var(--hiviz);border-radius:3px;background:#FFFDF2;padding:12px 14px;margin-bottom:16px}
.subrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;cursor:pointer;background:#fff}
.subrow:hover{border-color:var(--water);background:#F6F9FA}
.revsec{border:1px solid var(--line);border-radius:3px;padding:12px;margin-bottom:12px;background:#FBFCFC}
.revsec.off{opacity:.45;background:#F2F4F5}
.revsec table{margin-top:2px}
.revsec th{cursor:default}


/* vendors */
.oprow{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--line);border-left:4px solid var(--alarm);border-radius:3px;margin-bottom:8px;background:#FDF7F6}
.vsites{border:1px solid var(--line);border-radius:3px;padding:12px;background:#F6F8F9;margin-top:4px}


/* jobs */
.jsum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;border:1px solid var(--line);border-radius:3px;padding:12px;background:#F6F8F9;margin-bottom:16px}
.jsum>div{display:flex;flex-direction:column;gap:2px}
.jsum b{font-size:19px;font-weight:700}
.docs{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
.doc{position:relative;width:86px;border:1px solid var(--line);border-radius:3px;overflow:hidden;background:#fff;flex:none}
.doc.img{width:70px}
.doc img{width:70px;height:70px;object-fit:cover;display:block;cursor:zoom-in}
.dico{height:56px;display:flex;align-items:center;justify-content:center;background:#EDF0F2;cursor:pointer;border-bottom:1px solid var(--line)}
.dico:hover{background:#DCE7EC}
.ext{font-family:'JetBrains Mono';font-size:11px;font-weight:700;color:var(--water);letter-spacing:.04em}
.dmeta{padding:4px 5px;display:flex;flex-direction:column;gap:1px}
.dn{font-size:10px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;color:var(--ink)}
.dn:hover{color:var(--water)}
.dx{position:absolute;top:2px;right:2px;width:17px;height:17px;border:none;border-radius:2px;background:rgba(14,21,28,.72);color:#fff;font-size:12px;line-height:14px;padding:0}
.dx:hover{background:var(--alarm)}
.dadd{display:flex;align-items:center;justify-content:center;min-width:86px;height:56px;border:1.5px dashed #9FADB8;border-radius:3px;background:#F6F8F9;cursor:pointer;flex:none;padding:0 8px;text-align:center}
.dadd:hover{border-color:var(--water);background:#EAF2F6}
.dadd input{display:none}
.dadd span{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mute);line-height:1.25}
.dadd:hover span{color:var(--water)}
.dadd.busy{opacity:.6;cursor:wait}

<script type="text/babel">

const stageIx=id=>STAGES.findIndex(s=>s.id===id);
const VERTICALS=['Commercial Property Mgmt','HOA / Condo Mgmt','Multifamily / Apartments','Medical & Assisted Living','Hospitality / Restaurant','Plumbing Partner','Insurance / Adjuster','General Contractor','School / Church / Municipal','Real Estate / Broker','Other'];

// cadence: max days between touches before it goes stale
const CADENCE={lead:21,prospect:14,opp:10,verbal:7,priority:45,vip:30};

const WEEKLY=[
  {id:'dials',   lab:'Dials',                 goal:100},
  {id:'convos',  lab:'Decision-maker convos', goal:20},

  {d:'Tuesday',   t:'FIELD DAY — one market only. Meetings, presentations, drop-offs'},
  {d:'Wednesday', t:'BLOCK DAY — 8a–12p dials and email. Door closed'},

const DM=[
 {id:'s1',n:'Stage 1',t:'Orientation walk',d:'Building profile + every shutoff located, tagged and photographed.'},
 {id:'s2',n:'Stage 2',t:'Systems & documentation',d:'Floor plans, risers, mechanical rooms, sprinkler zones, access.'},
 {id:'s3',n:'Stage 3',t:'Contact tree & authorization',d:'Escalation ladder, dollar thresholds, pre-signed work authorization.'},
 {id:'s4',n:'Stage 4',t:'Vulnerability analysis',d:'What is most likely to fail here, what it would cost, delivered in writing.'},
];
const SYSTEMS=['Domestic water — main','Domestic water — floor/riser','Gas — main','Electrical — main','Electrical — panel','Sprinkler — main / OS&Y','Fire pump','Boiler / hot water','HVAC / chiller','Sump / ejector pump','Irrigation'];
const BTYPES=['Office','Retail','Multifamily','Condo / HOA','Medical / dental','Assisted living','Hotel','Restaurant','Warehouse / industrial','Mixed use','School','Church','Municipal'];
const ROLES=['Property manager','Assistant manager','Building engineer','Maintenance tech','On-site super','Owner / asset manager','Board president','Security','After-hours answering service'];

const SEV=['Low','Moderate','High','Critical'];
const newBldg=()=>({id:uid(),name:'',address:'',btype:BTYPES[0],year:'',sf:'',floors:'',units:'',occupancy:'',construction:'',sprinklered:'',alarm:'',sitePhotos:[],plans:[],
  shutoffs:[],access:{keys:'',codes:'',afterHours:'',elevator:'',dock:'',parking:''},
  docs:{floorplans:false,risers:false,mech:false,roof:false,sprinklerZones:false,photos:false},
  contacts:[],vendors:[],vulns:[],losses:'',auth:{signed:false,threshold:'',signer:''},delivered:false,notes:''});

/* completeness scoring — drives the stage badges everywhere */
function dmScore(b){
  const has=v=>!!(v&&String(v).trim());
  const s1=[has(b.name),has(b.address),has(b.btype),has(b.sf)||has(b.floors),b.shutoffs.length>0,
            b.shutoffs.length>0&&b.shutoffs.every(x=>x.tagged),
            b.shutoffs.length>0&&b.shutoffs.every(x=>(x.photos||[]).length>0),
            b.shutoffs.some(x=>/water/i.test(x.system))];
  const s2=[b.docs.floorplans,b.docs.risers,b.docs.mech,b.docs.sprinklerZones,b.docs.photos,
            has(b.access.keys)||has(b.access.codes),has(b.access.afterHours)];
  const s3=[b.contacts.length>=2,b.contacts.some(c=>/engineer|maintenance|super/i.test(c.role)),
            b.contacts.some(c=>has(c.afterHours)),(b.vendors||[]).filter(x=>x.vid).length>=2,
            b.auth.signed,has(b.auth.threshold)];
  const s4=[b.vulns.length>0,b.vulns.some(v=>v.sev==='High'||v.sev==='Critical')||b.vulns.length>=3,
            b.vulns.every(v=>has(v.fix)),has(b.losses),b.delivered];
  const p=a=>Math.round(a.filter(Boolean).length/a.length*100);
  const st={s1:p(s1),s2:p(s2),s3:p(s3),s4:p(s4)};
  st.all=Math.round((st.s1+st.s2+st.s3+st.s4)/4);
  return st;
}
const acctScore=a=>{const B=a.bldgs||[];if(!B.length)return {all:0,s1:0,s2:0,s3:0,s4:0,n:0};
  const S=B.map(dmScore);const avg=k=>Math.round(S.reduce((n,x)=>n+x[k],0)/S.length);
  return {all:avg('all'),s1:avg('s1'),s2:avg('s2'),s3:avg('s3'),s4:avg('s4'),n:B.length};};

/* ---------------- playbook: the handbook, in the tool ---------------- */
const PLAY=[
 {g:'Foundation',items:[
  {id:'p-position',t:'What we actually sell',k:'Positioning',h:`
<p><b>We do not sell water extraction.</b> We sell downtime avoidance and predictable recovery to people whose careers get damaged when a building goes down.</p>
<p>Every conversation runs on three buyer fears:</p>
<table><thead><tr><th>Fear</th><th>What they lose</th><th>What we sell</th></tr></thead><tbody>
<tr><td>"It'll take forever to get someone here."</td><td>Hours of flooding, tenant fury</td><td>A guaranteed response window, 24/7/365</td></tr>
<tr><td>"I'll get blamed and it'll be a mess."</td><td>Their reputation with ownership</td><td>A documented, defensible process</td></tr>
<tr><td>"The bill will be a surprise and insurance will fight it."</td><td>Budget, capital reserves</td><td>Xactimate-standard, carrier-ready documentation</td></tr>
</tbody></table>
<blockquote>"We're a restoration contractor, but what property managers actually hire us for is a plan. We build a written emergency response plan for your building <i>before</i> anything happens — shutoffs, contacts, floor plans, escalation — so when something does, we're already inside the door instead of in the parking lot asking questions."</blockquote>
<p class="note">Memorize that. It is the whole pitch.</p>`},
  {id:'p-icp',t:'Who we chase — and who we walk away from',k:'ICP',h:`
<p><b>Tier 1 — highest lifetime value, pursue hardest</b></p>
<ol>
<li><b>Commercial property management firms</b> — portfolios of 5+ buildings</li>
<li><b>HOA / condo management</b> — high leak frequency, board-driven, extremely sticky</li>

</ol>
<p><b>Tier 2 — volume and velocity</b></p>
<ol start="6">
<li><b>Plumbing companies</b> — the single best referral channel we have. They are physically inside the building at the moment of loss.</li>
<li>Insurance agents, independent adjusters, TPAs</li>

<p><b>Disqualify fast:</b></p>

  {id:'p-ladder',t:'The account ladder',k:'Definitions',h:`
<p>Nobody advances an account on vibes. These are the same definitions the board uses.</p>
<table><thead><tr><th>Stage</th><th>Definition</th><th>Exit criteria</th></tr></thead><tbody>
<tr><td><b>Lead</b></td><td>Name on the target list. Little or no contact.</td><td>Verified decision-maker + live phone or email</td></tr>
<tr><td><b>Prospect</b></td><td>Two-way contact made. Deal likely within 6 months. No meeting yet.</td><td>A meeting is on the calendar</td></tr>
<tr><td><b>Opportunity</b></td><td>At least one face-to-face. Realistically signable in 100 days.</td><td>Presentation delivered to the decision-maker</td></tr>

 ]},
 {g:'The 90-day gameplan',items:[
  {id:'p-phase0',t:'Week 0 — load the gun',k:'Before any calling',h:`
<ul>
<li>Build the <b>Master Target List</b>: 300 named accounts across the four markets.</li>

  {id:'p-phase1',t:'Days 1–30 — contact and calendar',k:'Phase 1',h:`

<p>Weekly quota per rep: 100 dials · 50 personalized emails · 10 in-person drop-offs · <b>10 meetings booked</b> · 5 meetings held.</p>
<p><b>The 14-day sequence per target:</b></p>

</tbody></table>
<p>No response after day 14 → nurture list. Do not burn them.</p>`},
  {id:'p-phase2',t:'Days 31–60 — present and propose',k:'Phase 2',h:`
<p><b>Goal: 25 presentations delivered, 10 verbals.</b></p>
<p>Every presentation ends in one of three outcomes — never "I'll send you something":</p>

  {id:'p-rhythm',t:'The weekly rhythm',k:'Non-negotiable',h:`
<p>The gameplan fails without the rhythm. Identical every week.</p>

<p><b>Monthly:</b> pipeline deep-dive — anything that's been an Opportunity for 120 days gets demoted. Be honest.<br/>

 ]},
 {g:'The field playbook',items:[
  {id:'p-phone',t:'The phone',k:'Script',h:`
<p><b>The only goal of a cold call is the meeting.</b> Not education. Not a quote. The meeting.</p>
<div class="script" data-copy="Hi [Name], this is [You] with Allied Restoration in Petaluma. Quick reason for the call — we build emergency response plans for commercial properties, so when there's a flood or a fire, we already have your shutoffs, your floor plans, and your contact tree before we roll a truck.

I'm not calling to sell you anything today. I'm working with a few other property management firms in [market] and I'd like 20 minutes to show you what the plan looks like, and you can decide if it's useful.

Do you have anything Tuesday morning, or is later in the week better?">
<p>Hi [Name], this is [You] with Allied Restoration in Petaluma. Quick reason for the call — we build emergency response plans for commercial properties, so when there's a flood or a fire, we already have your shutoffs, your floor plans, and your contact tree before we roll a truck.</p>
<p>I'm not calling to sell you anything today. I'm working with a few other [property managers / HOA managers] in [market] and I'd like 20 minutes to show you what the plan looks like, and you can decide if it's useful.</p>
<p>Do you have anything Tuesday morning, or is later in the week better?</p>
</div>
<p><b>Rules:</b></p>
<ul>
<li>Never ask "how are you today?" — it announces a sales call.</li>
<li>Never say "just following up." Give a reason for every call.</li>
<li>Alternative-choice close only. Never "would you like to meet?" — always "Tuesday or Thursday?"</li>

  {id:'p-obj',t:'Objections',k:'Acknowledge → Isolate → Reframe → Re-ask',h:`
<table><thead><tr><th>They say</th><th>You say</th></tr></thead><tbody>
<tr><td>"We already have a restoration company."</td><td>"Good — you should. Most of my clients did too. I'm not asking you to fire anyone. I'm asking to be the <i>second</i> number, because on the day it happens the first one is usually already on three other jobs. Do you have a written plan on file with them, or just a phone number?"</td></tr>
<tr><td>"Send me some info."</td><td>"Sure. One question so I send the right thing — is your bigger risk aging supply lines, or tenant-caused water losses?" <i>(then re-ask for the meeting)</i></td></tr>
<tr><td>"Not in the budget."</td><td>"There's no budget line for this — the plan is free. We only get paid when there's a loss, and then it's the carrier paying. The only thing this costs you is 20 minutes."</td></tr>
<tr><td>"Too busy right now."</td><td>"Understood — that's exactly the problem. Everybody builds the plan <i>after</i> the flood, at 2am, when they're the busiest they'll ever be. That's why I only need 20 minutes now."</td></tr>

<tr><td>"Just give me your rates."</td><td>"I'll give you the rate sheet — we bill Xactimate, same as your carrier, so there are no surprises. But price is the wrong question. The question is who shows up in 60 minutes at 2am. Can I show you how we do that?"</td></tr>
</tbody></table>`},
  {id:'p-meet1',t:'The first meeting — the 12 questions',k:'Diagnose, do not pitch',h:`
<p><b>Eighty percent of the first meeting is you asking questions.</b> If you talked more than they did, you lost. Bring these on paper and take notes visibly — it flatters them and builds the file.</p>
<ol>
<li>How many properties do you manage, and where?</li>
<li>What's the mix — commercial, multifamily, HOA, medical?</li>
<li>Tell me about the last water or fire loss you dealt with. Walk me through the day.</li>
<li>What went wrong in that process? What would you have changed?</li>
<li>Who do you call first when a building floods at 2am — a name, or a number?</li>
<li>How long did it take them to get on site, honestly?</li>
<li>Do you have a written emergency response plan? Can you show it to me?</li>
<li>Do your on-site staff know where the main shutoffs are — right now, without looking?</li>
<li>Who signs the work authorization, and what's your dollar threshold?</li>
<li>Who's your carrier, and have claims been disputed on documentation?</li>
<li>What does ownership hold you accountable for when a building goes down?</li>
<li>If we did nothing else, what would make me valuable to you in the next 90 days?</li>
</ol>
<p class="note">Never leave without: the next meeting on the calendar, the names of everyone else who decides, and the buildings list.</p>`},
  {id:'p-present',t:'The presentation meeting',k:'25 minutes, hard stop',h:`
<p><b>Decision-makers present, or reschedule.</b> A presentation to someone who has to "run it up" is a rehearsal, not a meeting.</p>
<ol>
<li><b>Play back their pain</b> (3 min) — quote their own words from meeting one. This is the whole game.</li>
<li><b>The three fears</b> (2 min) — response, blame, cost.</li>
<li><b>The Allied Response Plan</b> (8 min) — what we build, what it costs them (nothing), what it does at 2am.</li>
<li><b>Proof</b> (5 min) — a real job. Real timeline, real photos, real Xactimate estimate, real outcome.</li>
<li><b>The independence story</b> (2 min) — ARC remediates, NIET tests, never both on one building.</li>
<li><b>The ask</b> (5 min) — "Let's get you set up as a Priority client and schedule the walkthrough. What does Thursday look like?"</li>
</ol>
<p class="note">Never present price before the plan. Never email the deck before you present it.</p>`},

<div class="script" data-copy="Hi — I'm not here to sell anything and I don't have an appointment. I'm just dropping this off for [Name]. It's an emergency prep guide for the building. Could I get your name, so I know who I gave it to?">

</div>
<p>Now you have a name, a face, and a reason to call.</p>
<p><b>Contents:</b> Emergency Prep one-pager · a physical shutoff tag (it gets kept) · business card · a handwritten note — actually handwritten · one case study.</p>`},

 {g:'The Allied Response Plan',items:[
  {id:'p-arp',t:'What the ARP is, and why it wins',k:'Our product',h:`
<p>A free, written, building-specific emergency response plan that lives in our dispatch system and in their hands.</p>
<p><b>Contents:</b></p>
<ul>
<li>Building profile — age, systems, construction type, square footage, occupancy</li>
<li>Water, gas and electrical shutoffs — <b>photographed and physically tagged</b></li>
<li>Floor plans, riser diagrams, roof access, elevator keys</li>
<li>Contact tree — who calls whom, at what dollar threshold, at what hour</li>
<li>Access protocol — keys, codes, badges, after-hours security</li>
<li>Their vendors — plumber, electrician, IEP, carrier, agent</li>
<li>Pre-signed work authorization up to an agreed threshold</li>
<li>Known vulnerabilities and prior loss history</li>
<li>Our response commitment, in writing</li>
</ul>
<p><b>Why it wins:</b></p>
<ul>
<li>It costs the client <b>zero dollars</b> — which kills the number-one objection outright.</li>
<li>Building it puts us <b>inside their buildings</b>, meeting their staff. That's the real value.</li>
<li>It creates switching cost. Nobody rebuilds a 40-building response plan to save 4% on an invoice.</li>
<li>It converts the sale from vendor selection into partnership — a different, shorter decision.</li>
</ul>`},
  {id:'p-walk',t:'The walkthrough is the actual close',k:'Four stages',h:`
<p>The signature gets you access. <b>The walkthrough gets you the job.</b></p>
<p><b>Stage 1 — Orientation walk</b> (60–90 min per building). Tour with facilities staff. Photograph and tag every shutoff. Note access. Meet the building engineer — <i>the engineer is the person who actually calls you at 2am, not the manager who signed.</i> Buy the engineer coffee. Give the engineer your cell.</p>
<p><b>Stage 2 — Systems &amp; documentation.</b> Floor plans, risers, mechanical rooms, sprinkler zones. Everything photographed into Encircle.</p>
<p><b>Stage 3 — Contact tree &amp; authorization.</b> Build the escalation ladder. Get the pre-signed work authorization. Set the dollar thresholds.</p>
<p><b>Stage 4 — Vulnerability analysis.</b> Deliver a written assessment: what is most likely to fail here, and what it would cost. Present it to the manager <i>and</i> to ownership if you can get in the room. This document sells the next three buildings.</p>
<p class="note">If a client won't allow a walkthrough, they are <b>Verbal</b>, not Priority. Don't fool yourself. Keep asking — tie it to a lunch-and-learn: "I'll bring lunch for the site staff and we'll do the walk after."</p>`},
 ]},

<p>Most restoration companies win an account and then vanish until there's a loss. That's how you lose it.</p>

</tbody></table>
<p class="note">Any VIP untouched for 45 days goes red on the board and gets raised at Monday huddle. No exceptions.</p>`},
  {id:'p-lunch',t:'Lunch & learns',k:'Best retention weapon we have',h:`
<p>Free lunch for their staff, 30 minutes of genuinely useful training. You get a room full of the people who actually find the leaks.</p>
<p><b>Topics that get accepted:</b></p>
<ul>
<li>The first 60 minutes of a water loss — what to do before we arrive</li>
<li>How to shut off water in your building without flooding the floor below</li>
<li>Mold: what's actually a hazard, and what's a tenant complaint</li>
<li>Reading a moisture map — what your restoration contractor should be showing you</li>
<li>Building envelope failures — where water actually gets in</li>
<li>Wildfire smoke and IAQ — what carriers will and won't cover</li>
<li>What your carrier requires for documentation, and how contractors get you denied</li>
</ul>
<p>Always end by installing shutoff tags on the spot, and asking one survey question: <b>"What's the building you worry about most?"</b> That answer is your next job.</p>`},

<p>One page, sent to the manager <i>and</i> to their boss:</p>

<li>Jobs handled this quarter, response times actually achieved</li>
<li>Total mitigated · billed to carrier vs. out of pocket</li>
<li><b>Losses avoided</b> — near-misses their staff caught because the plan existed</li>
<li>Recommendations for next quarter</li>
</ul>
<p>This is the document that keeps the account and gets you referred internally.</p>`},

const PLAY_FLAT=PLAY.flatMap(g=>g.items.map(i=>({...i,g:g.g})));
const STAGE_HELP={lead:'p-phase1',prospect:'p-phone',opp:'p-present',verbal:'p-arp',priority:'p-walk',vip:'p-am'};

const today=()=>new Date().toISOString().slice(0,10);
const daysSince=d=>d?Math.floor((new Date(today())-new Date(d))/864e5):999;
const weekKey=(dt=new Date())=>{const d=new Date(dt);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10);};
const fmtWeek=k=>{const d=new Date(k+'T00:00:00');const e=new Date(d);e.setDate(e.getDate()+4);const m=x=>x.toLocaleDateString('en-US',{month:'short',day:'numeric'});return `${m(d)} – ${m(e)}`;};
const uid=()=>Math.random().toString(36).slice(2,9);

const SEED=[
  {id:uid(),name:'Bayline Property Group',vertical:'Commercial Property Mgmt',market:'San Francisco',contact:'Dana Ruiz',title:'Director of Facilities',phone:'(415) 555-0142',email:'druiz@bayline.example',stage:'opp',doors:14,last:'',next:'',notes:'14 buildings SOMA + Mission. Had a sprinkler discharge in Feb, unhappy with response time.',bldgs:[],created:today()},

/* ---------------- app ---------------- */
function App(){
  const [db,setDb]=useState(null);
  const [tab,setTab]=useState('board');
  const [edit,setEdit]=useState(null);
  const [ready,setReady]=useState(false);
  const [jump,setJump]=useState(null);
  const [gate,setGate]=useState(null);   // 'signin' | Error | null
  const [imp,setImp]=useState(false);
  const [V,setV]=useState([]);
  const [J,setJ]=useState([]);
  const go=id=>{setEdit(null);setJump(id);setTab('play');window.scrollTo(0,0);};

  const normalize=base=>{
    const B=newBldg();
    base.accts=(base.accts||[]).map(a=>({...a,bldgs:(a.bldgs||[]).map(b=>({...B,...b,
      access:{...B.access,...(b.access||{})},docs:{...B.docs,...(b.docs||{})},auth:{...B.auth,...(b.auth||{})},
      shutoffs:(b.shutoffs||[]).map(x=>({photos:[],...x})),
      contacts:b.contacts||[],
      // vendors used to be free text on the building; they're directory links now.
      // Anything without a vid is legacy and gets dropped from the link list.
      vendors:(b.vendors||[]).filter(x=>x&&x.vid),
      vulns:b.vulns||[]}))}));
    base.weeks=base.weeks||{};
    return base;
  };

  useEffect(()=>{ (async()=>{
    try{
      const {signedIn}=await Store.init();
      if(!signedIn){ setGate('signin'); setReady(true); return; }
      const d=await Store.loadAll();
      setDb(normalize(d|| {accts:Store.isRemote?[]:SEED,weeks:{}} ));
      setV(await Store.loadVendors());
      setJ(await Store.loadJobs());
    }catch(err){ setGate(err); }
    setReady(true);
  })(); },[]);

  if(!ready) return <Splash msg="Loading the board…"/>;
  if(gate) return <Gate g={gate}/>;
  if(!db)  return <Splash msg="Loading the board…"/>;

  const A=db.accts;
  const persist=next=>{ setDb(next); Store.saveLocal(next); };

  const upsert=a=>{
    persist({...db, accts: A.some(x=>x.id===a.id)? A.map(x=>x.id===a.id?a:x) : [a,...A]});
    Store.saveAccount(a);
  };
  const remove=id=>{ persist({...db, accts:A.filter(x=>x.id!==id)}); Store.deleteAccount(id); };

  const saveJob=j=>{
    setJ(p=>{const n=p.some(x=>x.id===j.id)? p.map(x=>x.id===j.id?j:x) : [j,...p];
      Store.saveJobsLocal(n); return n;});
    Store.saveJob(j);
  };
  const deleteJob=id=>{
    setJ(p=>{const n=p.filter(x=>x.id!==id); Store.saveJobsLocal(n); return n;});
    Store.deleteJob(id);
  };

  const saveVendor=v=>{
    setV(p=>{const n=p.some(x=>x.id===v.id)? p.map(x=>x.id===v.id?v:x) : [v,...p];
      Store.saveVendorsLocal(n); return n;});
    Store.saveVendor(v);
  };
  const deleteVendor=id=>{
    setV(p=>{const n=p.filter(x=>x.id!==id); Store.saveVendorsLocal(n); return n;});
    Store.deleteVendor(id);
    // unlink from every building
    A.forEach(a=>{
      const touched=(a.bldgs||[]).some(b=>(b.vendors||[]).some(x=>x.vid===id));
      if(touched) upsert({...a, bldgs:a.bldgs.map(b=>({...b, vendors:(b.vendors||[]).filter(x=>x.vid!==id)}))});
    });
  };
  const move=(id,stage)=>{ const a=A.find(x=>x.id===id); if(a) upsert({...a,stage,last:today()}); };
  const touch=id=>{ const a=A.find(x=>x.id===id); if(a) upsert({...a,last:today()}); };

  const wk=weekKey();
  const wdata=db.weeks[wk]||{};
  const bump=(k,n)=>{
    const w={...(db.weeks[wk]||{})};
    w[k]=Math.max(0,(w[k]||0)+n);
    const next={...db,weeks:{...db.weeks,[wk]:w}};
    persist(next);
    Store.saveWeek(wk,w);
  };

  const exportJSON=()=>{
    const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`team-allied-bd-${today()}.json`;a.click();
  };
  const exportCSV=()=>{
    const cols=['name','vertical','market','contact','title','phone','email','stage','doors','last','next','notes'];
    const esc=v=>`"${String(v??'').replace(/"/g,'""')}"`;
    const csv=[cols.join(','),...A.map(a=>cols.map(c=>esc(a[c])).join(','))].join('\n');
    const b=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`team-allied-accounts-${today()}.csv`;a.click();
  };
  const importJSON=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{
      const d=normalize(JSON.parse(r.result));
      if(!d.accts) throw 0;
      if(Store.isRemote && !confirm(`Import ${d.accts.length} accounts into the shared board? Accounts with the same ID will be overwritten.`)) return;
      persist(d);
      if(Store.isRemote) d.accts.forEach(a=>Store.saveAccount(a));
    }catch(err){alert('That file did not parse. Export a fresh backup and try again.');}};
    r.readAsText(f);e.target.value='';
  };

  const u=Store.user();

  return <>
    <div className="hazard"/>
    <header className="top">
      <div>
        <div className="brand">Team <b>Allied</b> — BD Command Center</div>
        <div className="tagline">
          {Store.isRemote
            ? <>Shared board · signed in as {u?.email}</>
            : <>Standalone mode · this browser only</>}
        </div>
      </div>
      <div className="top-right">
        <button className="btn gh" onClick={exportCSV}>Export CSV</button>
        <button className="btn gh" onClick={exportJSON}>Back up</button>
        <label className="btn gh" style={{margin:0}}>Restore<input type="file" accept=".json" onChange={importJSON} style={{display:'none'}}/></label>
        <button className="btn gh" onClick={()=>setImp(true)}>Import list</button>
        {Store.isRemote && <button className="btn gh" onClick={()=>Store.signOut()}>Sign out</button>}
        <button className="btn pri" onClick={()=>setEdit({id:uid(),name:'',vertical:VERTICALS[0],market:MARKETS[0],contact:'',title:'',phone:'',email:'',stage:'lead',doors:0,last:'',next:'',notes:'',bldgs:[],created:today()})}>+ Add account</button>
      </div>
    </header>

    <nav className="tabs">
      {[['board','Response board'],['week','This week'],['accounts','Accounts'],['today',"Today's calls"],['mine','Data mining'],['jobs','Job history'],['vendors','Vendors'],['inbox','From clients'],['plan','Gameplan'],['play','Playbook']].map(([k,l])=>
        <button key={k} className={tab===k?'on':''} onClick={()=>setTab(k)}>{l}</button>)}
    </nav>

    <main>
      {tab==='board'    && <Board A={A} move={move} onOpen={setEdit} go={go}/>}
      {tab==='week'     && <Week A={A} wk={wk} w={wdata} bump={bump} weeks={db.weeks} go={go}/>}
      {tab==='accounts' && <Accounts A={A} onOpen={setEdit} remove={remove} touch={touch}/>}
      {tab==='today'    && <CallSheet A={A} touch={touch} onOpen={setEdit} go={go}/>}
      {tab==='mine'     && <Mining A={A} V={V} onSave={upsert} onSaveVendor={saveVendor} go={go}/>}
      {tab==='jobs'     && <Jobs J={J} A={A} V={V} onSaveJob={saveJob} onDeleteJob={deleteJob} go={go}/>}
      {tab==='vendors'  && <Vendors V={V} A={A} onSaveVendor={saveVendor} onDeleteVendor={deleteVendor} onSaveAccount={upsert} go={go}/>}
      {tab==='inbox'    && <Inbox A={A} onSave={upsert} go={go}/>}
      {tab==='plan'     && <Plan A={A} go={go}/>}
      {tab==='play'     && <Playbook jump={jump} clear={()=>setJump(null)}/>}
    </main>

    {imp && <Importer A={A} onClose={()=>setImp(false)} onImport={async list=>{
      try{
        await Store.saveAccounts(list);
        persist({...db, accts:[...list,...A]});
      }catch(err){ alert(err.message); }
    }}/>}

    {edit && <Editor a={edit} J={J.filter(j=>j.acctId===edit.id)} onSave={a=>{upsert(a);setEdit(null);}} onClose={()=>setEdit(null)} onDelete={id=>{remove(id);setEdit(null);}}
      onGoMine={a=>{upsert(a);setEdit(null);setTab('mine');window.scrollTo(0,0);}}/>}
  </>;
}

function Splash({msg}){
  return <><div className="hazard"/><div className="splash"><div className="brand" style={{color:'#0E151C'}}>Team <b style={{color:'#B99A00'}}>Allied</b></div><p>{msg}</p></div></>;
}

function Gate({g}){
  const [busy,setBusy]=useState(false);
  const err = g!=='signin' ? g : null;
  return <><div className="hazard"/><div className="splash">
    <div className="gatecard">
      <div className="brand" style={{color:'#0E151C',fontSize:30}}>Team <b style={{color:'#B99A00'}}>Allied</b></div>
      <div className="tagline" style={{color:'#6B7A87'}}>BD Command Center</div>
      {err ? <>
        <div className="gateerr">
          <b>{err.notMember ? 'Not on the members list' : 'Could not connect'}</b>
          <p>{err.message}</p>
        </div>
        <button className="btn" onClick={()=>Store.signOut()}>Sign in as someone else</button>
      </> : <>
        <p style={{fontSize:13,color:'#46545F',lineHeight:1.55,margin:'14px 0 18px'}}>
          Sign in with your Team Allied Google account. Accounts, response plans and shutoff photos are shared across the team.
        </p>
        <button className="btn pri" style={{width:'100%',padding:'11px'}} disabled={busy}
          onClick={async()=>{setBusy(true);try{await Store.signIn();}catch(e){alert(e.message);setBusy(false);}}}>
          {busy?'Opening Google…':'Sign in with Google'}
        </button>
        <p className="hint" style={{marginTop:14}}>Your email has to be on the members list. If it isn't, ask Michael to add it.</p>
      </>}
