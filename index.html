              <div style={{flex:1}}>
                <b>{v.name}</b> <span className="tag">{v.cat}</span>
                <div className="hint">{v.contact}{v.phone?` · ${v.phone}`:''}</div>
              </div>
              <button className="btn sm pri">Attach</button>
            </div>)}
          </div>
        </div>
        <div className="foot">
          <button className="btn" style={{marginRight:'auto'}} onClick={()=>{setPick(false);onNewVendor();}}>+ New vendor</button>
          <button className="btn dk" onClick={()=>setPick(false)}>Cancel</button>
        </div>
      </div>
    </div>}
  </>;
}

/* ---- client portal: send the link, review what comes back ---- */

function ShareBox({a,b}){
  const [sh,setSh]=useState(null);
  const [old,setOld]=useState([]);
  const [busy,setBusy]=useState(false);
  const [copied,setCopied]=useState('');

  useEffect(()=>{ Store.listShares(b.id).then(setOld); },[b.id]);

  const make=async()=>{
    setBusy(true);
    try{ const r=await Store.createShare(a,b,60); setSh(r); setOld(await Store.listShares(b.id)); }
    catch(e){ alert(e.message); }
    setBusy(false);
  };
  const copy=(txt,what)=>{ navigator.clipboard?.writeText(txt).then(()=>{setCopied(what);setTimeout(()=>setCopied(''),1500);}); };

  const live=old.filter(x=>!x.revoked && (!x.expires_at || new Date(x.expires_at)>new Date()));

  const email = sh ? `Subject: Your building profile — ${b.name||'the building'}

Hi —

Here's the link to your building profile. It takes about ten minutes, and it's the part of the response plan only you can fill in: where the shutoffs are, who to call, and how we get in the door at 2am.

Link: ${sh.url}
Access code: ${sh.code}

Fill in what you know and skip what you don't — we'll catch the rest on the walkthrough. Photos of the valves help more than anything else.

Allied Restoration Company · (415) 529-5637 · 24/7/365` : '';

  return <div className="sharebox">
    {!sh ? <>
      <div className="row" style={{justifyContent:'space-between'}}>
        <div>
          <div className="disp" style={{fontSize:16}}>Have the client fill it in</div>
          <div className="hint">They know where the valves are. A manager who spent an hour on their own plan doesn't switch vendors.</div>
        </div>
        <button className="btn pri" onClick={make} disabled={busy}>{busy?'Creating…':'Create a link'}</button>
      </div>
      {live.length>0 && <div className="hint" style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--line)'}}>
        {live.length} link{live.length===1?'':'s'} already active for this building.
        {live.map(x=><span key={x.token}> · <b>{x.code}</b> ({x.views} view{x.views===1?'':'s'})
          <button className="plink" style={{marginLeft:4}} onClick={async()=>{await Store.revokeShare(x.token);setOld(await Store.listShares(b.id));}}>revoke</button>
        </span>)}
      </div>}
    </> : <>
      <div className="disp" style={{fontSize:16,marginBottom:8}}>Link is live</div>
      <div className="f2" style={{marginBottom:10}}>
        <div className="fld"><label>Send them this</label>
          <input readOnly value={sh.url} onFocus={e=>e.target.select()}/></div>
        <div className="fld"><label>And tell them this code</label>
          <input readOnly value={sh.code} style={{fontFamily:'JetBrains Mono',fontWeight:700,fontSize:17,letterSpacing:'.1em',textAlign:'center'}}/></div>
      </div>
      <div className="row" style={{gap:8}}>
        <button className="btn sm" onClick={()=>copy(sh.url,'link')}>Copy link</button>
        <button className="btn sm" onClick={()=>copy(sh.code,'code')}>Copy code</button>
        <button className="btn sm pri" onClick={()=>copy(email,'email')}>Copy the whole email</button>
        {copied && <span className="copied">Copied the {copied}</span>}
      </div>
      <div className="hint" style={{marginTop:8}}>
        Send the code separately from the link — a text or a phone call. Expires in 60 days. It's a
        working document, so send it before the walkthrough, not after.
      </div>
    </>}
  </div>;
}

/* what the client sent back */
function Inbox({A,onSave,go}){
  const [subs,setSubs]=useState(null);
  const [open,setOpen]=useState(null);
  const load=()=>Store.pendingSubmissions().then(setSubs);
  useEffect(()=>{load();},[]);

  if(subs===null) return <div className="card"><div className="empty">Checking for submissions…</div></div>;
  if(!subs.length) return <div className="card"><div className="empty">
    <b>Nothing waiting</b>
    When a client fills in their building profile, it lands here for review before it touches the plan.
    Create a link from any building in <b>Data mining</b>.
  </div></div>;

  const acctOf=s=>A.find(a=>a.id===s.account_id);
  const bldgOf=s=>{const a=acctOf(s);return a&&(a.bldgs||[]).find(b=>b.id===s.building_id);};

  return <div className="grid">
    <div className="card">
      <h3>From clients <span className="mono" style={{fontSize:12,color:'var(--mute)'}}>{subs.length} waiting</span></h3>
      <div className="body">
        <div className="hint" style={{marginBottom:12}}>
          Nothing here is live yet. Read it, then accept the fields you want. Their vulnerability
          analysis is not theirs to write — we keep that.
        </div>
        {subs.map(s=>{
          const a=acctOf(s), b=bldgOf(s);
          return <div key={s.id} className="subrow" onClick={()=>setOpen(s)}>
            <div style={{flex:1,minWidth:0}}>
              <b>{a?a.name:'(account since deleted)'}</b>
              <span className="hint"> · {b?b.name:'(building since deleted)'}</span>
              <div className="hint">
                {s.submitted_by||'someone'} · {new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
                {s.note && <> · "{s.note}"</>}
              </div>
            </div>
            <div className="row" style={{gap:5,flexWrap:'nowrap'}}>
              {(s.payload.shutoffs||[]).length>0 && <span className="tag w">{(s.payload.shutoffs||[]).length} shutoffs</span>}
              {(s.payload.contacts||[]).length>0 && <span className="tag g">{(s.payload.contacts||[]).length} contacts</span>}
              <button className="btn sm pri">Review</button>
            </div>
          </div>;
        })}
      </div>
    </div>

    {open && <Review s={open} a={acctOf(open)} b={bldgOf(open)}
      onClose={()=>setOpen(null)}
      onDone={async(merged)=>{
        if(merged){
          const a=acctOf(open);
          onSave({...a, bldgs:a.bldgs.map(x=>x.id===open.building_id?merged:x)});
        }
        await load(); setOpen(null);
      }}/>}
  </div>;
}

/* side by side: ours vs theirs, field by field */
function Review({s,a,b,onClose,onDone}){
  const theirs=s.payload;
  const [take,setTake]=useState({});   // which sections we're accepting
  const [busy,setBusy]=useState(false);

  if(!a||!b) return <div className="modal" onMouseDown={onClose}><div className="sheet" onMouseDown={e=>e.stopPropagation()}>
    <h2>Can't merge this</h2>
    <div className="body"><p>The account or building this came from has since been deleted. Nothing to merge into.</p></div>
    <div className="foot"><button className="btn dang" onClick={async()=>{await Store.reviewSubmission(s.id,'rejected');onDone(null);}}>Discard it</button>
    <button className="btn dk" onClick={onClose}>Close</button></div>
  </div></div>;

  const FIELDS=[
    ['name','Building name'],['address','Address'],['year','Year built'],['sf','Square feet'],
    ['floors','Floors'],['units','Units'],['sprinklered','Sprinklered'],['alarm','Alarm'],
  ];
  const changed=FIELDS.filter(([k])=>String(theirs[k]||'')!==String(b[k]||'') && String(theirs[k]||'').trim());
  const ACCESS=[['keys','Keys'],['codes','Codes'],['afterHours','After hours'],['elevator','Elevator'],['dock','Dock'],['parking','Parking']];
  const accessChanged=ACCESS.filter(([k])=>String(theirs.access?.[k]||'')!==String(b.access?.[k]||'') && String(theirs.access?.[k]||'').trim());

  const t=(k,v)=>setTake(p=>({...p,[k]:v}));
  const on=k=>take[k]!==false;   // default: accept

  const accept=async()=>{
    setBusy(true);
    try{
      const m={...b};
      if(on('profile')) changed.forEach(([k])=>{ m[k]=theirs[k]; });
      if(on('access'))  m.access={...b.access, ...Object.fromEntries(accessChanged.map(([k])=>[k,theirs.access[k]]))};

      if(on('shutoffs') && (theirs.shutoffs||[]).length){
        // adopt their photos into our bucket, then append anything we don't already have
        const add=[];
        for(const x of theirs.shutoffs){
          const dupe=(b.shutoffs||[]).some(y=>y.system===x.system && (y.loc||'').toLowerCase()===(x.loc||'').toLowerCase());
          if(dupe) continue;
          const photos=[];
          for(const p of (x.photos||[])) photos.push(await Store.adoptPhoto(p));
          add.push({id:uid(),system:x.system,loc:x.loc||'',how:x.how||'',tagged:false,photo:photos.length>0,photos,note:'From the client'});
        }
        m.shutoffs=[...(b.shutoffs||[]),...add];
      }
      if(on('contacts') && (theirs.contacts||[]).length){
        const add=theirs.contacts.filter(x=>!(b.contacts||[]).some(y=>(y.name||'').toLowerCase()===(x.name||'').toLowerCase()&&x.name))
                                 .map(x=>({id:uid(),name:x.name||'',role:x.role||ROLES[0],phone:x.phone||'',afterHours:x.afterHours||'',auth:x.auth||''}));
        m.contacts=[...(b.contacts||[]),...add];
      }
      if(on('vendors') && (theirs.vendors||[]).length){
        const add=theirs.vendors.filter(x=>!(b.vendors||[]).some(y=>(y.co||'').toLowerCase()===(x.co||'').toLowerCase()&&x.co))
                                .map(x=>({id:uid(),kind:x.kind||VENDORS[0],co:x.co||'',phone:x.phone||''}));
        m.vendors=[...(b.vendors||[]),...add];
      }
      await Store.reviewSubmission(s.id,'accepted');
      onDone(m);
    }catch(e){ alert('Could not merge: '+e.message); setBusy(false); }
  };

  const Sec=({k,title,n,children})=> <div className={'revsec'+(on(k)?'':' off')}>
    <label className="chk" style={{marginBottom:8}}>
      <input type="checkbox" checked={on(k)} onChange={e=>t(k,e.target.checked)}/>
      <b>{title}</b>{n!=null && <span className="tag w" style={{marginLeft:6}}>{n}</span>}
    </label>
    {children}
  </div>;

  return <div className="modal" onMouseDown={e=>{if(e.target===e.currentTarget&&!busy)onClose();}}>
    <div className="sheet wide" onMouseDown={e=>e.stopPropagation()}>
      <h2>{a.name}
        <span className="hint" style={{fontWeight:400,marginLeft:8,textTransform:'none',letterSpacing:0,fontFamily:'Inter'}}>
          {b.name} · sent by {s.submitted_by||'a client'}
        </span>
      </h2>
      <div className="body" style={{maxHeight:'62vh',overflow:'auto'}}>
        {s.note && <div className="note" style={{margin:'0 0 14px'}}><b>They said:</b> "{s.note}"</div>}

        {!changed.length && !accessChanged.length && !(theirs.shutoffs||[]).length
          && !(theirs.contacts||[]).length && !(theirs.vendors||[]).length
          ? <div className="hint">They opened it but didn't add anything. Worth a call — the form may have been confusing, or they may not know where the shutoffs are, which is itself useful to know.</div>
          : <>
          {changed.length>0 && <Sec k="profile" title="Building details" n={changed.length}>
            <table><thead><tr><th>Field</th><th>Ours</th><th>Theirs</th></tr></thead><tbody>
              {changed.map(([k,l])=><tr key={k}>
                <td style={{fontWeight:600}}>{l}</td>
                <td className="hint">{b[k]||'—'}</td>
                <td><b>{theirs[k]}</b></td>
              </tr>)}
            </tbody></table>
          </Sec>}

          {(theirs.shutoffs||[]).length>0 && <Sec k="shutoffs" title="Shutoffs" n={theirs.shutoffs.length}>
            <table><thead><tr><th>System</th><th>Where</th><th>Notes</th><th>Photos</th></tr></thead><tbody>
              {theirs.shutoffs.map((x,i)=><tr key={i}>
                <td><b>{x.system}</b></td><td>{x.loc||'—'}</td><td className="hint">{x.how||'—'}</td>
                <td>{(x.photos||[]).length? <span className="tag g">{x.photos.length}</span> : <span className="hint">none</span>}</td>
              </tr>)}
            </tbody></table>
            <div className="hint" style={{marginTop:5}}>These come in <b>untagged</b> — the client can tell you where the valve is, but only we can hang the tag. Verify on the walk.</div>
          </Sec>}

          {(theirs.contacts||[]).length>0 && <Sec k="contacts" title="Contact tree" n={theirs.contacts.length}>
            <table><thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>After hours</th><th>Authorizes to</th></tr></thead><tbody>
              {theirs.contacts.map((x,i)=><tr key={i}>
                <td><b>{x.name||'—'}</b></td><td>{x.role}</td><td className="mono" style={{fontSize:11.5}}>{x.phone||'—'}</td>
                <td className="mono" style={{fontSize:11.5}}>{x.afterHours||'—'}</td><td>{x.auth||'—'}</td>
              </tr>)}
            </tbody></table>
          </Sec>}

          {accessChanged.length>0 && <Sec k="access" title="Access" n={accessChanged.length}>
            <table><thead><tr><th>Field</th><th>Ours</th><th>Theirs</th></tr></thead><tbody>
              {accessChanged.map(([k,l])=><tr key={k}>
                <td style={{fontWeight:600}}>{l}</td><td className="hint">{b.access?.[k]||'—'}</td><td><b>{theirs.access[k]}</b></td>
              </tr>)}
            </tbody></table>
          </Sec>}

          {(theirs.vendors||[]).length>0 && <Sec k="vendors" title="Their vendors" n={theirs.vendors.length}>
            <table><thead><tr><th>Type</th><th>Company</th><th>Phone</th></tr></thead><tbody>
              {theirs.vendors.map((x,i)=><tr key={i}><td>{x.kind}</td><td><b>{x.co||'—'}</b></td><td className="mono" style={{fontSize:11.5}}>{x.phone||'—'}</td></tr>)}
            </tbody></table>
          </Sec>}
        </>}
      </div>
      <div className="foot">
        <button className="btn dang" style={{marginRight:'auto'}} disabled={busy}
          onClick={async()=>{if(confirm('Discard this submission? The client is not notified.')){await Store.reviewSubmission(s.id,'rejected');onDone(null);}}}>
          Discard
        </button>
        <button className="btn dk" onClick={onClose} disabled={busy}>Close</button>
        <button className="btn pri" onClick={accept} disabled={busy}>{busy?'Merging…':'Accept into the plan'}</button>
      </div>
    </div>
  </div>;
}

/* ---------------- DATA MINING ---------------- */
function StageBar({st,sm}){
  return <div className="dmbar" style={sm?{gap:3}:{}}>
    {DM.map(d=>{const v=st[d.id];return <div key={d.id} className="dmseg" title={d.n+' — '+d.t+': '+v+'%'}>
      <div className="dmtrk"><i style={{width:v+'%',background:v===100?'var(--go)':v>0?'var(--water)':'transparent'}}/></div>
      {!sm && <span className="dmlab">{d.n.replace('Stage ','S')}</span>}
    </div>;})}
  </div>;
}

function Mining({A,V,onSave,onSaveVendor,go}){
  const [sel,setSel]=useState(null); // {acctId, bldgId}
  const [q,setQ]=useState('');
  const signed=A.filter(a=>stageIx(a.stage)>=4);
  const rows=useMemo(()=>{
    const R=[];
    signed.forEach(a=>(a.bldgs||[]).forEach(b=>R.push({a,b,st:dmScore(b)})));
    return R.filter(r=>!q||`${r.a.name} ${r.b.name} ${r.b.address}`.toLowerCase().includes(q.toLowerCase()))
            .sort((x,y)=>x.st.all-y.st.all);
  },[A,q]);

  const addB=a=>{const b=newBldg();b.name=`Building ${(a.bldgs||[]).length+1}`;onSave({...a,bldgs:[...(a.bldgs||[]),b]});setSel({acctId:a.id,bldgId:b.id});};
  const cur=sel&&(()=>{const a=A.find(x=>x.id===sel.acctId);const b=a&&(a.bldgs||[]).find(x=>x.id===sel.bldgId);return a&&b?{a,b}:null;})();

  const tagged=rows.reduce((n,r)=>n+r.b.shutoffs.filter(s=>s.tagged).length,0);
  const untagged=rows.reduce((n,r)=>n+r.b.shutoffs.filter(s=>!s.tagged).length,0);
  const done=rows.filter(r=>r.st.all===100).length;
  const crit=rows.reduce((n,r)=>n+r.b.vulns.filter(v=>v.sev==='Critical'||v.sev==='High').length,0);

  if(!signed.length) return <div className="card"><div className="empty">
    <b>No signed clients yet</b>
    Data mining starts after the agreement. Move an account to Priority or VIP on the response board, then come back and log its buildings.
    <div style={{marginTop:12}}><button className="btn pri" onClick={()=>go('p-walk')}>Read: the walkthrough is the actual close →</button></div>
  </div></div>;

  return <div className="grid">
    <div className="kpis">
      <Kpi lab="Buildings in the program" val={rows.length} sub={`${signed.length} signed clients`}/>
      <Kpi lab="Plans complete" val={done} sub="all four stages at 100%" cls={done?'go':''}/>
      <Kpi lab="Shutoffs tagged" val={tagged} sub={untagged?`${untagged} still untagged`:'all tagged'} cls={untagged?'hz':'go'}/>
      <Kpi lab="High / critical risks" val={crit} sub="logged in vulnerability analysis" cls={crit?'al':''}/>
    </div>

    <div className="card">
      <h3>Data mining — Allied Response Plans
        <button className="plink" style={{marginLeft:'auto',fontFamily:'Inter'}} onClick={()=>go('p-walk')}>The four stages →</button>
      </h3>
      <div className="body">
        <div className="bar">
          <input placeholder="Search buildings…" value={q} onChange={e=>setQ(e.target.value)} style={{minWidth:220}}/>
          <span className="hint">Sorted least complete first — work the top of the list.</span>
        </div>

        {signed.map(a=>{
          const B=(a.bldgs||[]).filter(b=>!q||`${a.name} ${b.name} ${b.address}`.toLowerCase().includes(q.toLowerCase()));
          if(q&&!B.length) return null;
          const sc=acctScore(a);
          return <div key={a.id} className="acctblk">
            <div className="acctblk-h">
              <div>
                <b>{a.name}</b>
                <span className="tag" style={{marginLeft:8,background:STAGES[stageIx(a.stage)].c,color:a.stage==='vip'?'#0E151C':'#fff'}}>{STAGES[stageIx(a.stage)].name}</span>
                <div className="hint">{a.market} · {sc.n} building{sc.n===1?'':'s'} logged{a.doors>sc.n?` · ${a.doors-sc.n} still to walk`:''}</div>
              </div>
              <div className="row" style={{gap:10}}>
                <div style={{minWidth:130}}><StageBar st={sc}/></div>
                <button className="btn sm pri" onClick={()=>addB(a)}>+ Building</button>
              </div>
            </div>
            {!B.length ? <div className="hint" style={{padding:'8px 12px'}}>No buildings logged yet. Add one before the orientation walk — you can fill it in on site from your phone.</div> :
            <div className="blist">
              {B.map(b=>{const st=dmScore(b);const un=b.shutoffs.filter(x=>!x.tagged).length;
                return <div key={b.id} className="brow" onClick={()=>setSel({acctId:a.id,bldgId:b.id})}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:13}}>{b.name||'Untitled building'}</div>
                    <div className="hint" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{b.address||'No address'} · {b.btype}</div>
                  </div>
                  <div className="row" style={{gap:5,flexWrap:'nowrap'}}>
                    {b.shutoffs.length>0 && <span className={'tag '+(un?'y':'g')}>{b.shutoffs.length} shutoff{b.shutoffs.length===1?'':'s'}{un?` · ${un} untagged`:''}</span>}
                    {b.vulns.some(v=>v.sev==='Critical') && <span className="tag r">Critical risk</span>}
                    {st.all===100 && <span className="tag g">Plan complete</span>}
                  </div>
                  <div style={{width:120,flex:'none'}}><StageBar st={st}/></div>
                  <span className="mono" style={{width:40,textAlign:'right',fontWeight:700,fontSize:12,color:st.all===100?'var(--go)':'var(--mute)'}}>{st.all}%</span>
                </div>;})}
            </div>}
          </div>;
        })}
      </div>
    </div>

    {cur && <Building a={cur.a} b={cur.b} V={V} onSaveVendor={onSaveVendor} onClose={()=>setSel(null)}
      onSave={nb=>onSave({...cur.a,bldgs:cur.a.bldgs.map(x=>x.id===nb.id?nb:x)})}
      onDelete={()=>{onSave({...cur.a,bldgs:cur.a.bldgs.filter(x=>x.id!==cur.b.id)});setSel(null);}}/>}
  </div>;
}

      <div className="body" style={{maxHeight:'62vh',overflow:'auto'}}>

        {tab==='s1' && <>
          <div className="f2">

          <div className="f3">
            <div className="fld"><label>Type</label><select value={f.btype} onChange={e=>u('btype',e.target.value)}>{BTYPES.map(t=><option key={t}>{t}</option>)}</select></div>

          <div className="f3">

          </div>

            <div className="fld"><label>Construction</label><input value={f.construction} onChange={e=>u('construction',e.target.value)} placeholder="Type III, wood frame over podium"/></div>

          <Sect t="Shutoffs" sub="Every one gets located, photographed and physically tagged. This is the single most valuable thing in the plan."

            <div className="f3" style={{marginBottom:8}}>
              <div className="fld"><label>System</label><select value={x.system} onChange={e=>setRow('shutoffs',i,{...x,system:e.target.value})}>{SYSTEMS.map(y=><option key={y}>{y}</option>)}</select></div>
              <div className="fld"><label>Where it is</label><input value={x.loc} onChange={e=>setRow('shutoffs',i,{...x,loc:e.target.value})} placeholder="Basement mech room, NE corner behind door"/></div>
              <div className="fld"><label>How to operate</label><input value={x.how} onChange={e=>setRow('shutoffs',i,{...x,how:e.target.value})} placeholder="OS&Y wheel, 14 turns CW. Key #7."/></div>
            </div>
            <Photos photos={x.photos||[]} label={x.system}
              meta={{acct:a.name,bldg:f.name}}
              onChange={ph=>setRow('shutoffs',i,{...x,photos:ph,photo:ph.length>0})}/>
            <div className="row" style={{justifyContent:'space-between',marginTop:8}}>
              <label className="chk"><input type="checkbox" checked={x.tagged} onChange={e=>setRow('shutoffs',i,{...x,tagged:e.target.checked})}/> Physically tagged on site</label>
              <button className="btn sm dang" onClick={()=>delRow('shutoffs',i)}>Remove</button>
            </div>
          </div>)}
        </>}

        {tab==='s2' && <>
          <Sect t="Documentation collected"/>
          <div className="grid" style={{gap:6,marginBottom:16}}>
            {[['risers','Riser diagrams — water, sprinkler, electrical'],
              ['mech','Mechanical rooms located and photographed'],['sprinklerZones','Sprinkler zones mapped to floors'],
              ['roof','Roof access — how you get up there, who has the key']]
              .map(([k,t])=><label key={k} className={'tick'+(f.docs[k]?' done':'')}>
                <input type="checkbox" checked={f.docs[k]} onChange={e=>un('docs',k,e.target.checked)}/><span className="t">{t}</span></label>)}
          </div>
          <Plans b={f} a={a} onChange={p=>u('plans',p)}/>

          <Sect t="Site photos" sub="Mechanical rooms, risers, roof access, the panel you'll never find again in the dark."/>
          <Photos photos={f.sitePhotos||[]} label="site" meta={{acct:a.name,bldg:f.name}}
            onChange={ph=>u('sitePhotos',ph)}/>

          <Sect t="Access" sub="At 2am, the difference between 20 minutes and 3 hours is whether we can get in."/>
          <div className="f2">
            <div className="fld"><label>Keys — who has them, where is the lockbox</label><input value={f.access.keys} onChange={e=>un('access','keys',e.target.value)} placeholder="Lockbox at loading dock, code w/ dispatch"/></div>
            <div className="fld"><label>Codes / badges</label><input value={f.access.codes} onChange={e=>un('access','codes',e.target.value)} placeholder="Gate #4412 · badge from security desk"/></div>
          </div>
          <div className="f2">
            <div className="fld"><label>After-hours entry</label><input value={f.access.afterHours} onChange={e=>un('access','afterHours',e.target.value)} placeholder="Security on site 24/7, lobby desk"/></div>
            <div className="fld"><label>Elevator / freight</label><input value={f.access.elevator} onChange={e=>un('access','elevator',e.target.value)} placeholder="Freight car #3, key required"/></div>
          </div>
          <div className="f2">
            <div className="fld"><label>Loading dock</label><input value={f.access.dock} onChange={e=>un('access','dock',e.target.value)} placeholder="Rear alley, 12' clearance"/></div>
            <div className="fld"><label>Parking for trucks & equipment</label><input value={f.access.parking} onChange={e=>un('access','parking',e.target.value)} placeholder="Two spots in garage, low clearance — box trucks street only"/></div>
          </div>
        </>}

        {tab==='s3' && <>
          <ShareBox a={a} b={f}/>
          <Sect t="Contact tree" sub="In order. Who gets called first, who authorizes, who picks up at 2am."
            add={()=>addRow('contacts',{id:uid(),name:'',role:ROLES[0],phone:'',afterHours:'',auth:''})} addLab="+ Add contact"/>
          {!f.contacts.length && <div className="hint" style={{padding:'6px 0 12px'}}>Empty. The building engineer is the most important entry here — not the manager who signed.</div>}

            <div className="row" style={{gap:8,alignItems:'flex-end'}}>
              <span className="ord">{i+1}</span>
              <div className="fld" style={{flex:2}}><label>Name</label><input value={x.name} onChange={e=>setRow('contacts',i,{...x,name:e.target.value})}/></div>
              <div className="fld" style={{flex:2}}><label>Role</label><select value={x.role} onChange={e=>setRow('contacts',i,{...x,role:e.target.value})}>{ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
              <div className="fld" style={{flex:1.5}}><label>Phone</label><input value={x.phone} onChange={e=>setRow('contacts',i,{...x,phone:e.target.value})}/></div>
              <div className="fld" style={{flex:1.5}}><label>After-hours / cell</label><input value={x.afterHours} onChange={e=>setRow('contacts',i,{...x,afterHours:e.target.value})}/></div>
              <div className="fld" style={{flex:1.5}}><label>Can authorize up to</label><input value={x.auth} onChange={e=>setRow('contacts',i,{...x,auth:e.target.value})} placeholder="$10,000"/></div>
              <button className="btn sm dang" onClick={()=>delRow('contacts',i)}>×</button>
            </div>
          </div>)}

          <BldgVendors b={f} V={V}
            onChange={list=>u('vendors',list)}
            onNewVendor={()=>{const nv=newVendor();onSaveVendor(nv);u('vendors',[...(f.vendors||[]),{vid:nv.id,role:nv.cat}]);alert('Blank vendor created and attached. Fill it in on the Vendors tab.');}}/>

          <Sect t="Pre-signed work authorization" sub="This is the piece that lets us start extracting at 2am instead of waiting for a signature at 9am."/>
          <div className="f3">
            <div className="fld"><label>Signed?</label>
              <label className="tick" style={{marginTop:2}}><input type="checkbox" checked={f.auth.signed} onChange={e=>un('auth','signed',e.target.checked)}/><span className="t">On file</span></label></div>
            <div className="fld"><label>Auto-authorized up to</label><input value={f.auth.threshold} onChange={e=>un('auth','threshold',e.target.value)} placeholder="$25,000 mitigation"/></div>
            <div className="fld"><label>Who signed it</label><input value={f.auth.signer} onChange={e=>un('auth','signer',e.target.value)} placeholder="Dana Ruiz, Dir. of Facilities"/></div>
          </div>
        </>}

        {tab==='s4' && <>
          <Sect t="Vulnerability analysis" sub="What is most likely to fail here, and what it would cost them. This document sells the next three buildings."
            add={()=>addRow('vulns',{id:uid(),system:'',risk:'',sev:'Moderate',cost:'',fix:''})} addLab="+ Add finding"/>
          {!f.vulns.length && <div className="hint" style={{padding:'6px 0 12px'}}>Nothing logged. Walk the building looking for: original supply lines, unsupervised valves, no floor drains in mech rooms, water heaters above occupied space, dead sump pumps, roof drains that back up.</div>}
          {f.vulns.map((x,i)=><div key={x.id} className="rowcard">
            <div className="f3" style={{marginBottom:8}}>
              <div className="fld"><label>System / location</label><input value={x.system} onChange={e=>setRow('vulns',i,{...x,system:e.target.value})} placeholder="4th floor water heater closet"/></div>
              <div className="fld"><label>What could fail</label><input value={x.risk} onChange={e=>setRow('vulns',i,{...x,risk:e.target.value})} placeholder="1998 tank, no drain pan, sits above the server room"/></div>
              <div className="fld"><label>Severity</label>
                <select value={x.sev} onChange={e=>setRow('vulns',i,{...x,sev:e.target.value})}>{SEV.map(v=><option key={v}>{v}</option>)}</select></div>
            </div>
            <div className="row" style={{gap:10,alignItems:'flex-end'}}>
              <div className="fld" style={{flex:1}}><label>Est. loss if it fails</label><input value={x.cost} onChange={e=>setRow('vulns',i,{...x,cost:e.target.value})} placeholder="$180k + 3 weeks downtime"/></div>
              <div className="fld" style={{flex:2}}><label>Recommendation</label><input value={x.fix} onChange={e=>setRow('vulns',i,{...x,fix:e.target.value})} placeholder="Add pan + leak sensor tied to alarm. ~$1,200."/></div>
              <button className="btn sm dang" onClick={()=>delRow('vulns',i)}>Remove</button>
            </div>
          </div>)}

          <Sect t="Loss history"/>
          <div className="fld"><textarea rows="3" value={f.losses} onChange={e=>u('losses',e.target.value)} placeholder="Feb 2024 — sprinkler head knocked off on 3, ~$60k, took the prior vendor 4 hours to arrive. Oct 2022 — roof drain backup."/></div>
          <label className={'tick'+(f.delivered?' done':'')} style={{marginTop:12}}>
            <input type="checkbox" checked={f.delivered} onChange={e=>u('delivered',e.target.checked)}/>
            <span className="t"><b>Vulnerability analysis delivered</b> — presented to the manager, and to ownership if you could get in the room</span></label>
        </>}
      </div>

      <div className="foot">
        <button className="btn dang" style={{marginRight:'auto'}} onClick={()=>{if(confirm(`Delete ${f.name||'this building'}?`))onDelete();}}>Delete building</button>
        <button className="btn" onClick={async()=>{try{await printARP(a,f,V);}catch(e){alert('Could not build the plan: '+e.message);}}}>Generate response plan</button>
        <button className="btn pri" onClick={onClose}>Done</button>
      </div>
    </div>
  </div>;
}

function Sect({t,sub,add,addLab}){
  return <div className="secth">
    <div><div className="disp" style={{fontSize:17}}>{t}</div>{sub&&<div className="hint">{sub}</div>}</div>
    {add&&<button className="btn sm pri" onClick={add}>{addLab}</button>}
  </div>;
}

/* ---- generate the client-facing Allied Response Plan ---- */

  const row=(k,v)=>v?`<tr><th>${esc(k)}</th><td>${esc(v)}</td></tr>`:'';

  // resolve photos to viewable URLs so the plan is useful on paper and on screen
  const plans=[];
  for(const pl of (b.plans||[])){
    try{ const u=await Store.photoURL(pl.img); if(u) plans.push({...pl,url:u}); }catch(e){}

${b.vulns.length?`<h2>Vulnerability analysis</h2><table class="g"><tr><th>Where</th><th>What could fail</th><th>Severity</th><th>Est. loss</th><th>Recommendation</th></tr>

  const signed=stageIx(f.stage)>=4;
  const save=()=>{ if(!f.name.trim()){alert('Give the account a company name.');return;} onSave(f); };
  return <div className="modal" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>

      <h2>{a.name||'New account'}</h2>

        <div className="f2">
          <div className="fld"><label>Vertical</label><select value={f.vertical} onChange={e=>u('vertical',e.target.value)}>{VERTICALS.map(v=><option key={v}>{v}</option>)}</select></div>

        </div>
        <div className="f2">
          <div className="fld"><label>Decision-maker</label><input value={f.contact} onChange={e=>u('contact',e.target.value)} placeholder="Dana Ruiz"/></div>
          <div className="fld"><label>Title</label><input value={f.title} onChange={e=>u('title',e.target.value)} placeholder="Director of Facilities"/></div>
        </div>
        <div className="f2">
          <div className="fld"><label>Phone</label><input value={f.phone} onChange={e=>u('phone',e.target.value)} placeholder="(415) 555-0142"/></div>
          <div className="fld"><label>Email</label><input value={f.email} onChange={e=>u('email',e.target.value)} placeholder="name@company.com"/></div>
        </div>
        <div className="f3">
          <div className="fld"><label>Stage</label><select value={f.stage} onChange={e=>u('stage',e.target.value)}>{STAGES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>

        <div className="hint" style={{marginTop:-4}}>{STAGES[stageIx(f.stage)].def} Touch at least every {CADENCE[f.stage]} days.</div>
        <div className="fld"><label>Next action</label><input value={f.next} onChange={e=>u('next',e.target.value)} placeholder={NEXT_ACTION[f.stage]}/></div>
        <div className="fld"><label>Notes — their words, their last loss, who else decides</label>
          <textarea rows="3" value={f.notes} onChange={e=>u('notes',e.target.value)} placeholder="Had a sprinkler discharge in February. Unhappy with the response time. Board approval needed over $10k."/></div>

        {J.length>0 && (()=>{
          const rev=J.reduce((n,j)=>n+jobRev(j),0);
          const gp=J.reduce((n,j)=>n+jobGP(j),0);
          const pc=rev?Math.round(gp/rev*100):null;
          const rt=J.map(j=>+j.responseMins).filter(x=>x>0);
          const avg=rt.length?Math.round(rt.reduce((a,b)=>a+b,0)/rt.length):null;
          return <div>
            <label style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.09em',color:'var(--mute)',fontWeight:600,display:'block',marginBottom:6}}>Work history</label>
            <div className="dmsum">
              <div className="jsum" style={{marginBottom:0}}>
                <div><span className="hint">Jobs</span><b className="mono">{J.length}</b></div>
                <div><span className="hint">Billed</span><b className="mono">{money(rev)}</b></div>
                <div><span className="hint">GP</span><b className="mono" style={{color:gp>=0?'var(--go)':'var(--alarm)'}}>{money(gp)}{pc!=null?` · ${pc}%`:''}</b></div>
                <div><span className="hint">Avg response</span><b className="mono">{avg?`${avg} min`:'—'}</b></div>
              </div>
              <div className="hint" style={{marginTop:8}}>
                {avg!=null && avg<=60
                  ? <>On site in under an hour on average. That's the number for the value report.</>
                  : avg!=null
                  ? <>Average response is {avg} minutes. That's the number they'll remember — and the one to fix.</>
                  : <>No response times logged. That's the metric they hired us for.</>}
              </div>
            </div>
          </div>;
        })()}

        {signed && <div>
          <label style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.09em',color:'var(--mute)',fontWeight:600,display:'block',marginBottom:6}}>Allied Response Plan — data mining</label>
          {(() => {
            const sc=acctScore(f);
            return <div className="dmsum">
              {sc.n ? <>
                <div className="row" style={{justifyContent:'space-between',marginBottom:8}}>
                  <span style={{fontSize:12.5}}><b>{sc.n}</b> building{sc.n===1?'':'s'} logged{f.doors>sc.n?<span className="hint"> · {f.doors-sc.n} still to walk</span>:''}</span>
                  <span className="mono" style={{fontWeight:700,color:sc.all===100?'var(--go)':'var(--water)'}}>{sc.all}%</span>
                </div>
                <StageBar st={sc}/>
              </> : <div className="hint" style={{marginBottom:8}}>No buildings logged. The signature got you access — the walkthrough gets you the job.</div>}
              <button className="btn pri" style={{marginTop:10,width:'100%'}} onClick={()=>{onGoMine(f);}}>Open data mining →</button>
            </div>;
          })()}
        </div>}
      </div>
      <div className="foot">
        {a.name && <button className="btn dang" style={{marginRight:'auto'}} onClick={()=>{if(confirm(`Delete ${a.name}?`))onDelete(a.id);}}>Delete</button>}
        <button className="btn dk" onClick={onClose}>Cancel</button>
        <button className="btn pri" onClick={save}>Save account</button>
      </div>
    </div>
  </div>;
}

function Kpi({lab,val,sub,cls=''}){return <div className={'kpi '+cls}><div className="lab">{lab}</div><div className="val">{val}</div><div className="sub">{sub}</div></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
